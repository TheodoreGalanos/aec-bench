[meta]
name = "velocity-check"
description = "Pipe velocity calculation and explicit range check"
long_description = "Calculates pipe velocity from flow rate and internal diameter, then compares it with explicit minimum and maximum velocity criteria. The template reports pipe area, velocity, margins, and a numeric range flag."
discipline = "mechanical"
category = "pipe-hydraulics"
standards = ["AWWA M11", "Crane TP-410"]
tags = ["mechanical", "pipe", "hydraulics", "velocity", "deterministic"]
tool_mode = "with-tool"

[params.flow_rate_l_s]
type = "float"
unit = "L/s"
description = "Pipe flow rate"
min = 0.0
max = 100000.0

[params.pipe_internal_diameter_mm]
type = "float"
unit = "mm"
description = "Pipe internal diameter"
min = 10.0
max = 5000.0

[params.minimum_velocity_m_s]
type = "float"
unit = "m/s"
description = "Minimum acceptable velocity"
min = 0.0
max = 20.0

[params.maximum_velocity_m_s]
type = "float"
unit = "m/s"
description = "Maximum acceptable velocity"
min = 0.1
max = 50.0

[outputs.pipe_area_m2]
description = "Pipe internal area"
tolerance = 0.03

[outputs.velocity_m_s]
description = "Calculated pipe velocity"
tolerance = 0.03

[outputs.min_margin_m_s]
description = "Velocity margin above minimum criterion"
tolerance = 0.03

[outputs.max_margin_m_s]
description = "Velocity margin below maximum criterion"
tolerance = 0.03

[outputs.velocity_within_range]
description = "Numeric flag where 1 means velocity is within the explicit range"
tolerance = 0.01

[archetypes.water_distribution]
description = "Water distribution pipe velocity check"
flow_rate_l_s = {min = 1.0, max = 1000.0}
pipe_internal_diameter_mm = {min = 50.0, max = 1200.0}
minimum_velocity_m_s = {min = 0.1, max = 0.8}
maximum_velocity_m_s = {min = 1.5, max = 4.0}
site_contexts = ["water-distribution-main", "pump-discharge"]

[archetypes.process_pipe]
description = "Industrial process pipe velocity check"
flow_rate_l_s = {min = 0.5, max = 500.0}
pipe_internal_diameter_mm = {min = 25.0, max = 600.0}
minimum_velocity_m_s = {min = 0.1, max = 1.0}
maximum_velocity_m_s = {min = 2.0, max = 8.0}
site_contexts = ["process-pipe", "utility-pipe"]

[difficulty.easy]
description = "All parameters given for water distribution pipes"
visibility = "all_given"
archetypes = ["water_distribution"]

[difficulty.medium]
description = "All parameters given across pipe types"
visibility = "all_given"
archetypes = ["water_distribution", "process_pipe"]

[difficulty.hard]
description = "All parameters given for process pipe velocity checks"
visibility = "all_given"
archetypes = ["process_pipe"]

