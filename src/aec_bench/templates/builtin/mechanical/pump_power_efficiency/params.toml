[meta]
name = "pump-power-efficiency"
description = "Pump hydraulic power, shaft power, and motor sizing"
long_description = "Calculates pump hydraulic power from flow, head, and fluid density, then accounts for pump efficiency, motor efficiency, and a sizing factor. The template reports shaft power, motor input power, and recommended motor size as explicit numeric outputs."
discipline = "mechanical"
category = "pump-hydraulics"
standards = ["Hydraulic Institute Standards"]
tags = ["mechanical", "pump", "power", "efficiency", "deterministic"]
tool_mode = "with-tool"

[params.flow_rate_m3_h]
type = "float"
unit = "m3/h"
description = "Pump flow rate"
min = 0.1
max = 20000.0

[params.total_dynamic_head_m]
type = "float"
unit = "m"
description = "Total dynamic head"
min = 0.1
max = 500.0

[params.fluid_density_kg_m3]
type = "float"
unit = "kg/m3"
description = "Fluid density"
min = 500.0
max = 1400.0

[params.pump_efficiency_pct]
type = "float"
unit = "%"
description = "Pump efficiency"
min = 1.0
max = 100.0

[params.motor_efficiency_pct]
type = "float"
unit = "%"
description = "Motor efficiency"
min = 1.0
max = 100.0

[params.motor_sizing_factor]
type = "float"
description = "Motor sizing factor"
min = 1.0
max = 2.0

[outputs.hydraulic_power_kw]
description = "Hydraulic power delivered to the fluid"
tolerance = 0.03

[outputs.shaft_power_kw]
description = "Pump shaft power"
tolerance = 0.03

[outputs.motor_input_power_kw]
description = "Motor electrical input power"
tolerance = 0.03

[outputs.recommended_motor_size_kw]
description = "Recommended motor power after sizing factor"
tolerance = 0.03

[archetypes.water_transfer_pump]
description = "Water transfer pump power sizing"
flow_rate_m3_h = {min = 10.0, max = 2000.0}
total_dynamic_head_m = {min = 10.0, max = 150.0}
fluid_density_kg_m3 = {min = 990.0, max = 1030.0}
pump_efficiency_pct = {min = 45.0, max = 85.0}
motor_efficiency_pct = {min = 85.0, max = 96.0}
motor_sizing_factor = {min = 1.05, max = 1.25}
site_contexts = ["water-transfer-pump", "pump-station-duty"]

[archetypes.process_pump]
description = "Industrial process pump power sizing"
flow_rate_m3_h = {min = 1.0, max = 1000.0}
total_dynamic_head_m = {min = 20.0, max = 250.0}
fluid_density_kg_m3 = {min = 700.0, max = 1300.0}
pump_efficiency_pct = {min = 35.0, max = 80.0}
motor_efficiency_pct = {min = 80.0, max = 95.0}
motor_sizing_factor = {min = 1.1, max = 1.4}
site_contexts = ["process-pump", "chemical-transfer-pump"]

[difficulty.easy]
description = "All parameters given for a water transfer pump"
visibility = "all_given"
archetypes = ["water_transfer_pump"]

[difficulty.medium]
description = "All parameters given across pump power settings"
visibility = "all_given"
archetypes = ["water_transfer_pump", "process_pump"]

[difficulty.hard]
description = "All parameters given for process pump motor sizing"
visibility = "all_given"
archetypes = ["process_pump"]
