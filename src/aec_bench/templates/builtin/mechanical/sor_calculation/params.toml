[meta]
name = "sor-calculation"
description = "Clarifier surface overflow rate calculation"
long_description = "Calculates clarifier surface overflow rate from flow and plan area, then compares the result with an explicit maximum design criterion. The template reports hydraulic loading, utilisation, margin, and a numeric criterion flag."
discipline = "mechanical"
category = "clarifier-design"
standards = ["Ten States Standards", "WEF MOP 8"]
tags = ["mechanical", "wastewater", "clarifier", "surface-overflow-rate", "deterministic"]
tool_mode = "with-tool"

[params.flow_rate_m3_d]
type = "float"
unit = "m3/d"
description = "Flow rate to the clarifier"
min = 1.0
max = 1000000.0

[params.clarifier_surface_area_m2]
type = "float"
unit = "m2"
description = "Clarifier plan surface area"
min = 1.0
max = 100000.0

[params.maximum_sor_m3_m2_d]
type = "float"
unit = "m3/m2.d"
description = "Maximum allowable surface overflow rate criterion"
min = 1.0
max = 100.0

[outputs.surface_overflow_rate_m3_m2_d]
description = "Calculated surface overflow rate"
tolerance = 0.03

[outputs.utilisation_ratio]
description = "Ratio of calculated SOR to maximum criterion"
tolerance = 0.03

[outputs.compliance_margin_m3_m2_d]
description = "Positive margin below the maximum criterion"
tolerance = 0.03

[outputs.criterion_satisfied]
description = "Numeric flag where 1 means the criterion is satisfied"
tolerance = 0.01

[archetypes.secondary_clarifier]
description = "Secondary clarifier hydraulic loading check"
flow_rate_m3_d = {min = 1000.0, max = 80000.0}
clarifier_surface_area_m2 = {min = 100.0, max = 4000.0}
maximum_sor_m3_m2_d = {min = 20.0, max = 45.0}
site_contexts = ["municipal-wwtp", "secondary-clarifier"]

[archetypes.water_treatment_clarifier]
description = "Water treatment clarifier hydraulic loading check"
flow_rate_m3_d = {min = 5000.0, max = 300000.0}
clarifier_surface_area_m2 = {min = 250.0, max = 10000.0}
maximum_sor_m3_m2_d = {min = 25.0, max = 60.0}
site_contexts = ["water-treatment-plant", "solids-contact-clarifier"]

[difficulty.easy]
description = "All parameters given for a secondary clarifier"
visibility = "all_given"
archetypes = ["secondary_clarifier"]

[difficulty.medium]
description = "All parameters given across wastewater and water clarifiers"
visibility = "all_given"
archetypes = ["secondary_clarifier", "water_treatment_clarifier"]

[difficulty.hard]
description = "All parameters given for larger water treatment clarifiers"
visibility = "all_given"
archetypes = ["water_treatment_clarifier"]

