[meta]
name = "gas-load-calculation"
description = "Connected and diversified gas load calculation"
long_description = "Calculates connected and diversified gas demand from explicit appliance gas loads, quantities, and diversity factor. The template reports demand in MJ/h and kW."
discipline = "mechanical"
category = "gas-services"
standards = ["AS/NZS 5601.1"]
tags = ["mechanical", "gas-services", "load", "demand", "deterministic"]
tool_mode = "with-tool"

[params.appliance_1_load_mj_h]
type = "float"
unit = "MJ/h"
description = "Gas load for first appliance group"
min = 0.0
max = 10000.0

[params.appliance_1_quantity]
type = "float"
unit = "-"
description = "Quantity of first appliance group"
min = 0.0
max = 1000.0

[params.appliance_2_load_mj_h]
type = "float"
unit = "MJ/h"
description = "Gas load for second appliance group"
min = 0.0
max = 10000.0

[params.appliance_2_quantity]
type = "float"
unit = "-"
description = "Quantity of second appliance group"
min = 0.0
max = 1000.0

[params.appliance_3_load_mj_h]
type = "float"
unit = "MJ/h"
description = "Gas load for third appliance group"
min = 0.0
max = 10000.0

[params.appliance_3_quantity]
type = "float"
unit = "-"
description = "Quantity of third appliance group"
min = 0.0
max = 1000.0

[params.diversity_factor]
type = "float"
unit = "-"
description = "Demand diversity factor"
min = 0.01
max = 1.0

[outputs.connected_load_mj_h]
description = "Total connected gas load"
tolerance = 0.03

[outputs.diversified_load_mj_h]
description = "Diversified gas load"
tolerance = 0.03

[outputs.connected_load_kw]
description = "Connected gas load in kilowatts"
tolerance = 0.03

[outputs.diversified_load_kw]
description = "Diversified gas load in kilowatts"
tolerance = 0.03

[archetypes.commercial_kitchen]
description = "Commercial kitchen appliance gas load"
appliance_1_load_mj_h = {min = 50.0, max = 500.0}
appliance_1_quantity = {min = 1.0, max = 20.0}
appliance_2_load_mj_h = {min = 20.0, max = 300.0}
appliance_2_quantity = {min = 0.0, max = 20.0}
appliance_3_load_mj_h = {min = 10.0, max = 200.0}
appliance_3_quantity = {min = 0.0, max = 20.0}
diversity_factor = {min = 0.5, max = 1.0}
site_contexts = ["commercial-kitchen", "food-service"]

[archetypes.plant_room]
description = "Plant room gas-fired equipment load"
appliance_1_load_mj_h = {min = 200.0, max = 5000.0}
appliance_1_quantity = {min = 1.0, max = 10.0}
appliance_2_load_mj_h = {min = 50.0, max = 2000.0}
appliance_2_quantity = {min = 0.0, max = 10.0}
appliance_3_load_mj_h = {min = 0.0, max = 1000.0}
appliance_3_quantity = {min = 0.0, max = 10.0}
diversity_factor = {min = 0.6, max = 1.0}
site_contexts = ["boiler-room", "gas-plant"]

[difficulty.easy]
description = "All parameters given for a commercial kitchen"
visibility = "all_given"
archetypes = ["commercial_kitchen"]

[difficulty.medium]
description = "All parameters given across gas services settings"
visibility = "all_given"
archetypes = ["commercial_kitchen", "plant_room"]

[difficulty.hard]
description = "All parameters given for plant room gas loads"
visibility = "all_given"
archetypes = ["plant_room"]

