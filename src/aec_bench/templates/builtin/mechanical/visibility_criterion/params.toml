[meta]
name = "visibility-criterion"
description = "Smoke visibility tenability criterion calculation"
long_description = "Calculates smoke visibility from extinction coefficient and an explicit visibility constant, then compares the result with a minimum visibility criterion. The template reports visibility, margin, utilisation, and a numeric criterion flag."
discipline = "mechanical"
category = "tenability-assessment"
standards = ["SFPE Handbook", "ISO 13571"]
tags = ["mechanical", "fire-safety", "tenability", "visibility", "deterministic"]
tool_mode = "with-tool"

[params.extinction_coefficient_m_inv]
type = "float"
unit = "1/m"
description = "Smoke extinction coefficient"
min = 0.001
max = 10.0

[params.visibility_constant]
type = "float"
unit = "-"
description = "Visibility constant for the target sign or object contrast"
min = 1.0
max = 20.0

[params.minimum_visibility_m]
type = "float"
unit = "m"
description = "Minimum acceptable visibility"
min = 0.1
max = 100.0

[outputs.visibility_m]
description = "Calculated visibility"
tolerance = 0.03

[outputs.visibility_margin_m]
description = "Visibility margin above minimum criterion"
tolerance = 0.03

[outputs.visibility_utilisation_ratio]
description = "Minimum visibility divided by calculated visibility"
tolerance = 0.03

[outputs.criterion_satisfied]
description = "Numeric flag where 1 means visibility meets the criterion"
tolerance = 0.01

[archetypes.egress_route]
description = "Egress route smoke visibility check"
extinction_coefficient_m_inv = {min = 0.05, max = 2.0}
visibility_constant = {min = 3.0, max = 10.0}
minimum_visibility_m = {min = 5.0, max = 15.0}
site_contexts = ["egress-route", "smoke-control-zone"]

[archetypes.large_volume_space]
description = "Large volume space smoke visibility check"
extinction_coefficient_m_inv = {min = 0.02, max = 1.0}
visibility_constant = {min = 3.0, max = 10.0}
minimum_visibility_m = {min = 10.0, max = 30.0}
site_contexts = ["atrium", "station-concourse"]

[difficulty.easy]
description = "All parameters given for an egress route"
visibility = "all_given"
archetypes = ["egress_route"]

[difficulty.medium]
description = "All parameters given across tenability settings"
visibility = "all_given"
archetypes = ["egress_route", "large_volume_space"]

[difficulty.hard]
description = "All parameters given for large volume spaces"
visibility = "all_given"
archetypes = ["large_volume_space"]

