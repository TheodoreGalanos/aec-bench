[meta]
name = "nitrification-srt"
description = "Required SRT for activated-sludge nitrification"
long_description = "Calculates required solids retention time for nitrification using temperature-corrected nitrifier growth with ammonia and dissolved oxygen limitation factors. The template reports growth factors, net growth rate, and the design SRT implied by a selected safety factor."
discipline = "mechanical"
category = "nutrient-removal"
standards = ["Metcalf and Eddy Wastewater Engineering"]
tags = ["mechanical", "wastewater", "nitrification", "srt", "deterministic"]
tool_mode = "with-tool"

[params.max_specific_growth_d]
type = "float"
unit = "1/d"
description = "Maximum specific nitrifier growth rate at 20 C"
min = 0.1
max = 2.0

[params.theta]
type = "float"
description = "Temperature correction coefficient"
min = 1.01
max = 1.15

[params.wastewater_temperature_c]
type = "float"
unit = "deg C"
description = "Wastewater temperature"
min = 5.0
max = 35.0

[params.ammonia_n_mg_l]
type = "float"
unit = "mg/L"
description = "Ammonia nitrogen concentration"
min = 0.1
max = 80.0

[params.half_saturation_n_mg_l]
type = "float"
unit = "mg/L"
description = "Ammonia half-saturation coefficient"
min = 0.05
max = 5.0

[params.dissolved_oxygen_mg_l]
type = "float"
unit = "mg/L"
description = "Dissolved oxygen concentration"
min = 0.1
max = 8.0

[params.oxygen_half_saturation_mg_l]
type = "float"
unit = "mg/L"
description = "Oxygen half-saturation coefficient"
min = 0.05
max = 2.0

[params.decay_rate_d]
type = "float"
unit = "1/d"
description = "Nitrifier decay rate"
min = 0.0
max = 0.2

[params.safety_factor]
type = "float"
description = "SRT safety factor"
min = 1.0
max = 4.0

[outputs.temperature_corrected_growth_d]
description = "Temperature-corrected maximum growth rate"
tolerance = 0.03

[outputs.substrate_factor]
description = "Ammonia substrate limitation factor"
tolerance = 0.03

[outputs.oxygen_factor]
description = "Dissolved oxygen limitation factor"
tolerance = 0.03

[outputs.net_growth_d]
description = "Net nitrifier growth rate"
tolerance = 0.03

[outputs.required_srt_days]
description = "Required solids retention time"
tolerance = 0.03

[archetypes.municipal_plant]
description = "Municipal wastewater nitrification SRT check"
max_specific_growth_d = {min = 0.6, max = 1.2}
theta = {min = 1.05, max = 1.10}
wastewater_temperature_c = {min = 12.0, max = 25.0}
ammonia_n_mg_l = {min = 2.0, max = 40.0}
half_saturation_n_mg_l = {min = 0.5, max = 2.0}
dissolved_oxygen_mg_l = {min = 1.5, max = 4.0}
oxygen_half_saturation_mg_l = {min = 0.3, max = 1.0}
decay_rate_d = {min = 0.03, max = 0.10}
safety_factor = {min = 1.2, max = 2.5}
site_contexts = ["municipal-activated-sludge", "secondary-treatment"]

[archetypes.cool_weather_upgrade]
description = "Cool-weather nitrification upgrade check"
max_specific_growth_d = {min = 0.8, max = 1.4}
theta = {min = 1.06, max = 1.12}
wastewater_temperature_c = {min = 8.0, max = 16.0}
ammonia_n_mg_l = {min = 5.0, max = 50.0}
half_saturation_n_mg_l = {min = 0.5, max = 1.5}
dissolved_oxygen_mg_l = {min = 2.0, max = 5.0}
oxygen_half_saturation_mg_l = {min = 0.3, max = 0.8}
decay_rate_d = {min = 0.02, max = 0.08}
safety_factor = {min = 1.5, max = 3.0}
site_contexts = ["winter-nitrification", "plant-upgrade"]

[difficulty.easy]
description = "All parameters given for a municipal plant"
visibility = "all_given"
archetypes = ["municipal_plant"]

[difficulty.medium]
description = "All parameters given across nitrification checks"
visibility = "all_given"
archetypes = ["municipal_plant", "cool_weather_upgrade"]

[difficulty.hard]
description = "All parameters given for cool-weather nitrification"
visibility = "all_given"
archetypes = ["cool_weather_upgrade"]
