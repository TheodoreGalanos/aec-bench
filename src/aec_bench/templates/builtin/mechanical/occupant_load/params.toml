[meta]
name = "occupant-load"
description = "Area-based occupant load calculation"
long_description = "Calculates occupant load from floor area and an explicit area-per-occupant criterion. The template reports unrounded occupants, design occupants rounded up to a whole person, and occupant density."
discipline = "mechanical"
category = "prescriptive-compliance"
standards = ["IBC", "NCC"]
tags = ["mechanical", "life-safety", "occupant-load", "deterministic"]
tool_mode = "with-tool"

[params.floor_area_m2]
type = "float"
unit = "m2"
description = "Floor area being assessed"
min = 1.0
max = 20000.0

[params.area_per_occupant_m2]
type = "float"
unit = "m2/person"
description = "Explicit area allowed per occupant"
min = 0.5
max = 100.0

[outputs.calculated_occupants]
description = "Unrounded occupant count"
tolerance = 0.03

[outputs.design_occupants]
description = "Occupant count rounded up to a whole person"
tolerance = 0.01

[outputs.occupant_density_person_m2]
description = "Design occupant density"
tolerance = 0.03

[archetypes.office_floor]
description = "Office floor occupant load check"
floor_area_m2 = {min = 100.0, max = 5000.0}
area_per_occupant_m2 = {min = 8.0, max = 15.0}
site_contexts = ["office-floor", "commercial-building"]

[archetypes.assembly_space]
description = "Assembly area occupant load check"
floor_area_m2 = {min = 50.0, max = 3000.0}
area_per_occupant_m2 = {min = 0.5, max = 3.0}
site_contexts = ["assembly-space", "station-concourse"]

[difficulty.easy]
description = "All parameters given for an office floor"
visibility = "all_given"
archetypes = ["office_floor"]

[difficulty.medium]
description = "All parameters given across occupancy types"
visibility = "all_given"
archetypes = ["office_floor", "assembly_space"]

[difficulty.hard]
description = "All parameters given for assembly occupancy"
visibility = "all_given"
archetypes = ["assembly_space"]

