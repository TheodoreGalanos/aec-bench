# ABOUTME: Defines the SSC-07 solar array ground bearing and earthing template.
# ABOUTME: Pins one PV rack, foundation, wind, resistivity, and grounding source pack.

[meta]
name = "solar-array-ground-bearing-earthing-package"
description = "SSC-07 solar array wind, ground bearing, and earthing metrics"
long_description = "Calculates source-bound PV rack and foundation metrics from a deterministic SSC-07 task-owned source pack. The template combines wind force, support reaction, bearing pressure, ballast uplift, grid resistance, and ground-potential-rise checks."
discipline = "ground"
category = "ground-investigation"
standards = ["PV rack wind screening", "shallow bearing check", "IEEE 80-style GPR screening"]
tags = ["ground", "solar", "pv", "wind", "bearing", "earthing", "deterministic"]
tool_mode = "with-tool"

[params.wind_pressure_kpa]
type = "float"
unit = "kPa"
description = "WIND-07-PV-01 design wind pressure"
min = 1.15
max = 1.15

[params.module_area_m2]
type = "float"
unit = "m2"
description = "PV-07-ARRAY-01 module tributary area"
min = 2.2
max = 2.2

[params.drag_coefficient]
type = "float"
description = "WIND-07-PV-01 rack drag coefficient"
min = 1.3
max = 1.3

[params.module_count]
type = "float"
unit = "count"
description = "PV-07-ARRAY-01 checked module count"
min = 24.0
max = 24.0

[params.support_count]
type = "float"
unit = "count"
description = "RACK-07-FOUND-01 support count sharing the wind reaction"
min = 12.0
max = 12.0

[params.ballast_dead_load_kn]
type = "float"
unit = "kN"
description = "RACK-07-FOUND-01 ballast dead load"
min = 50.0
max = 50.0

[params.footing_area_m2]
type = "float"
unit = "m2"
description = "RACK-07-FOUND-01 total bearing area"
min = 9.0
max = 9.0

[params.allowable_bearing_kpa]
type = "float"
unit = "kPa"
description = "RACK-07-FOUND-01 allowable foundation bearing pressure"
min = 85.0
max = 85.0

[params.soil_resistivity_ohm_m]
type = "float"
unit = "ohm-m"
description = "RES-07-PV-01 apparent soil resistivity"
min = 110.0
max = 110.0

[params.grid_length_m]
type = "float"
unit = "m"
description = "RES-07-PV-01 grounding grid length"
min = 20.0
max = 20.0

[params.grid_width_m]
type = "float"
unit = "m"
description = "RES-07-PV-01 grounding grid width"
min = 12.0
max = 12.0

[params.conductor_length_m]
type = "float"
unit = "m"
description = "RES-07-PV-01 buried conductor length"
min = 240.0
max = 240.0

[params.grid_current_ka]
type = "float"
unit = "kA"
description = "RES-07-PV-01 grid current"
min = 1.4
max = 1.4

[params.gpr_limit_v]
type = "float"
unit = "V"
description = "MEMO-07-PV-01 GPR screening limit"
min = 5000.0
max = 5000.0

[outputs.wind_force_total_kn]
description = "Design wind pressure times module area, drag coefficient, and module count"
tolerance = 0.03

[outputs.support_reaction_kn]
description = "Total wind force divided by support count"
tolerance = 0.03

[outputs.uplift_force_kn]
description = "Screening uplift force on the PV support group"
tolerance = 0.03

[outputs.uplift_margin_kn]
description = "Ballast dead load minus uplift force"
tolerance = 0.03

[outputs.bearing_pressure_kpa]
description = "Service bearing pressure under ballast and wind reaction"
tolerance = 0.03

[outputs.bearing_utilization]
description = "Bearing pressure divided by allowable bearing"
tolerance = 0.03

[outputs.grid_resistance_ohm]
description = "Simple grid resistance screening value"
tolerance = 0.03

[outputs.ground_potential_rise_v]
description = "Grid resistance times grid current"
tolerance = 0.03

[outputs.gpr_margin_v]
description = "GPR limit minus ground potential rise"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when uplift, bearing, and GPR checks pass"
tolerance = 0.03

[archetypes.ssc07_solar_array_case]
description = "Ground investigation package for one PV rack wind, bearing, and earthing check"
wind_pressure_kpa = {min = 1.15, max = 1.15}
module_area_m2 = {min = 2.2, max = 2.2}
drag_coefficient = {min = 1.3, max = 1.3}
module_count = {min = 24.0, max = 24.0}
support_count = {min = 12.0, max = 12.0}
ballast_dead_load_kn = {min = 50.0, max = 50.0}
footing_area_m2 = {min = 9.0, max = 9.0}
allowable_bearing_kpa = {min = 85.0, max = 85.0}
soil_resistivity_ohm_m = {min = 110.0, max = 110.0}
grid_length_m = {min = 20.0, max = 20.0}
grid_width_m = {min = 12.0, max = 12.0}
conductor_length_m = {min = 240.0, max = 240.0}
grid_current_ka = {min = 1.4, max = 1.4}
gpr_limit_v = {min = 5000.0, max = 5000.0}
site_contexts = ["pv-foundation", "earthing-handoff"]

[difficulty.easy]
description = "All source-pack values given for the SSC-07 solar array package"
visibility = "all_given"
archetypes = ["ssc07_solar_array_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-07 solar array package"
visibility = "all_given"
archetypes = ["ssc07_solar_array_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-07 solar array package"
visibility = "all_given"
archetypes = ["ssc07_solar_array_case"]
