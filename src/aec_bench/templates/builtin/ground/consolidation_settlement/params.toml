[meta]
name = "consolidation-settlement"
description = "Primary consolidation settlement for clay layers using Terzaghi's 1D theory"
long_description = "Estimates primary consolidation settlement of clay layers under applied loading using Terzaghi's one-dimensional theory. Handles normally consolidated, overconsolidated, and transitional cases via the compression index (Cc) and recompression index (Cr) on the e-log-p curve, with settlement governed by Sc = CcH/(1+e0) * log10(sigma_vf/sigma_v0) and its variants."
discipline = "ground"
category = "shallow-foundations"
standards = ["Terzaghi 1D consolidation theory"]
tags = ["geotechnical", "settlement", "consolidation", "clay", "deterministic"]
tool_mode = "with-tool"

[params.clay_thickness_m]
type = "float"
unit = "m"
description = "Clay layer thickness H"
min = 1.0
max = 20.0

[params.compression_index_cc]
type = "float"
description = "Compression index Cc"
min = 0.1
max = 1.5
derivable_from = "archetype"

[params.recompression_index_cr]
type = "float"
description = "Recompression index Cr"
min = 0.01
max = 0.15
derivable_from = "archetype"

[params.initial_void_ratio_e0]
type = "float"
description = "Initial void ratio e0"
min = 0.5
max = 3.0
derivable_from = "archetype"

[params.preconsolidation_pressure_kpa]
type = "float"
unit = "kPa"
description = "Preconsolidation pressure sigma'p"
min = 30
max = 500

[params.initial_effective_stress_kpa]
type = "float"
unit = "kPa"
description = "Initial effective overburden stress sigma'v0"
min = 20
max = 300

[params.final_effective_stress_kpa]
type = "float"
unit = "kPa"
description = "Final effective stress after loading sigma'vf"
min = 50
max = 600

# --- Outputs ---

[outputs.ocr]
description = "Overconsolidation ratio OCR"
tolerance = 0.03

[outputs.settlement_mm]
description = "Primary consolidation settlement Sc (mm)"
tolerance = 0.03

# --- Archetypes ---

[archetypes.soft_nc_clay]
description = "Soft normally consolidated marine clay"
compression_index_cc = {min = 0.4, max = 0.8}
recompression_index_cr = {min = 0.04, max = 0.08}
initial_void_ratio_e0 = {min = 1.2, max = 2.5}
site_contexts = ["brisbane-alluvial", "darwin-estuarine", "gladstone-marine"]

[archetypes.medium_oc_clay]
description = "Medium overconsolidated clay"
compression_index_cc = {min = 0.2, max = 0.4}
recompression_index_cr = {min = 0.02, max = 0.04}
initial_void_ratio_e0 = {min = 0.7, max = 1.2}
site_contexts = ["sydney-hawkesbury", "melbourne-brighton", "adelaide-stiff"]

[archetypes.stiff_oc_clay]
description = "Stiff heavily overconsolidated clay"
compression_index_cc = {min = 0.1, max = 0.25}
recompression_index_cr = {min = 0.01, max = 0.03}
initial_void_ratio_e0 = {min = 0.5, max = 0.8}
site_contexts = ["melbourne-basalt", "canberra-stiff", "perth-spearwood"]

# --- Difficulty presets ---

[difficulty.easy]
description = "NC clay, all parameters given, single-case settlement"
visibility = "all_given"
archetypes = ["soft_nc_clay"]

[difficulty.medium]
description = "OC clay, all parameters given, two-case settlement possible"
visibility = "all_given"
archetypes = ["soft_nc_clay", "medium_oc_clay", "stiff_oc_clay"]

[difficulty.hard]
description = "Soil properties hidden, agent must determine Cc, Cr, e0 from site description"
visibility = "partial"
hidden_params = ["compression_index_cc", "recompression_index_cr", "initial_void_ratio_e0"]
replacement_text = "The clay layer is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["soft_nc_clay", "medium_oc_clay", "stiff_oc_clay"]
