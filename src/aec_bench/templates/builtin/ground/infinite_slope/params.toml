[meta]
name = "infinite-slope"
description = "Factor of safety for infinite slope failure"
long_description = "Computes the factor of safety against shallow planar failure on long uniform slopes using the infinite slope equation with Mohr-Coulomb shear strength. Accounts for pore water pressure from a water table parallel to the slope surface, balancing the driving shear stress (gamma*z*sin(beta)*cos(beta)) against the resisting cohesion and frictional strength along the failure plane."
discipline = "ground"
category = "slope-stability"
standards = ["Standard geotechnical texts"]
tags = ["geotechnical", "slope-stability", "deterministic"]
tool_mode = "with-tool"

[params.slope_angle_deg]
type = "float"
unit = "degrees"
description = "Slope angle beta"
min = 5
max = 45

[params.friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle phi'"
min = 0
max = 45
derivable_from = "archetype"

[params.cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion c'"
min = 0
max = 150
derivable_from = "archetype"

[params.unit_weight_kn_m3]
type = "float"
unit = "kN/m³"
description = "Soil unit weight gamma"
min = 14
max = 23
derivable_from = "archetype"

[params.failure_depth_m]
type = "float"
unit = "m"
description = "Depth to failure surface z"
min = 0.5
max = 10.0

[params.water_table_depth_m]
type = "float"
unit = "m"
description = "Depth to water table from ground surface"
min = 0
max = 100.0
optional = true

[outputs.pore_pressure_kpa]
description = "Pore water pressure at failure surface u (kPa)"
tolerance = 0.03

[outputs.driving_stress_kpa]
description = "Driving shear stress (kPa)"
tolerance = 0.03

[outputs.resisting_stress_kpa]
description = "Resisting shear stress (kPa)"
tolerance = 0.03

[outputs.factor_of_safety]
description = "Factor of safety FoS"
tolerance = 0.03

[archetypes.soft_nc_clay]
description = "Soft normally consolidated clay"
cohesion_kpa = {min = 5, max = 15}
friction_angle_deg = {min = 0, max = 5}
unit_weight_kn_m3 = {min = 15, max = 17}
site_contexts = ["brisbane-alluvial", "darwin-estuarine"]

[archetypes.firm_clay]
description = "Firm clay"
cohesion_kpa = {min = 20, max = 50}
friction_angle_deg = {min = 2, max = 8}
unit_weight_kn_m3 = {min = 17, max = 19}
site_contexts = ["brisbane-alluvial", "melbourne-basalt"]

[archetypes.stiff_oc_clay]
description = "Stiff overconsolidated clay"
cohesion_kpa = {min = 50, max = 150}
friction_angle_deg = {min = 5, max = 15}
unit_weight_kn_m3 = {min = 18, max = 21}
site_contexts = ["sydney-hawkesbury", "adelaide-stiff", "melbourne-basalt"]

[archetypes.loose_sand]
description = "Loose sand"
cohesion_kpa = {min = 0, max = 0}
friction_angle_deg = {min = 28, max = 32}
unit_weight_kn_m3 = {min = 15, max = 17}
site_contexts = ["hunter-valley-alluvial"]

[archetypes.medium_dense_sand]
description = "Medium dense sand"
cohesion_kpa = {min = 0, max = 0}
friction_angle_deg = {min = 32, max = 36}
unit_weight_kn_m3 = {min = 17, max = 19}
site_contexts = ["perth-coastal", "hunter-valley-alluvial"]

[archetypes.dense_sand]
description = "Dense sand"
cohesion_kpa = {min = 0, max = 0}
friction_angle_deg = {min = 36, max = 42}
unit_weight_kn_m3 = {min = 19, max = 21}
site_contexts = ["perth-coastal", "cairns-coral"]

[archetypes.silty_sand]
description = "Silty sand"
cohesion_kpa = {min = 0, max = 5}
friction_angle_deg = {min = 28, max = 34}
unit_weight_kn_m3 = {min = 17, max = 19}
site_contexts = ["hunter-valley-alluvial"]

[archetypes.residual_weathered_rock]
description = "Residual/weathered rock"
cohesion_kpa = {min = 10, max = 30}
friction_angle_deg = {min = 30, max = 40}
unit_weight_kn_m3 = {min = 19, max = 22}
site_contexts = ["sydney-hawkesbury"]

[difficulty.easy]
description = "Dry cohesionless slope — simplest formula"
visibility = "all_given"
archetypes = ["loose_sand", "medium_dense_sand", "dense_sand", "silty_sand"]
cohesion_kpa = [0]
water_table = false

[difficulty.medium]
description = "Dry slope with cohesion — adds c' term"
visibility = "all_given"
archetypes = ["soft_nc_clay", "firm_clay", "stiff_oc_clay", "loose_sand", "medium_dense_sand", "dense_sand", "silty_sand", "residual_weathered_rock"]
water_table = false

[difficulty.hard]
description = "Water table present, soil parameters hidden"
visibility = "partial"
hidden_params = ["cohesion_kpa", "friction_angle_deg", "unit_weight_kn_m3"]
replacement_text = "The slope soil is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["soft_nc_clay", "firm_clay", "stiff_oc_clay", "loose_sand", "medium_dense_sand", "dense_sand", "silty_sand", "residual_weathered_rock"]
