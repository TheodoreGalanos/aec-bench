[meta]
name = "stormwater-pumping-outage-resilience-package"
description = "SSC-17 stormwater pumping outage and backup energy resilience metrics"
long_description = "Calculates source-bound stormwater pumping outage resilience metrics from a deterministic SSC-17 task-owned source pack. The template combines storm inflow volume, pumpable volume, storage margin, pump hydraulic/input power, critical controls load, BESS and generator energy autonomy, feeder voltage drop, and an overall synthetic pass score."
discipline = "electrical"
category = "energy-resilience"
standards = ["EPA SWMM", "NREL REopt", "stormwater pumping outage workflows", "backup energy dispatch workflows"]
tags = ["electrical", "stormwater", "pumping", "outage", "bess", "generator", "resilience", "feeder", "deterministic"]
tool_mode = "with-tool"

[params.storm_inflow_m3_s]
type = "float"
unit = "m3/s"
description = "RAIN-17-HYETO-01 average inflow during SCEN-17-STORM-OUTAGE-01"
min = 0.18
max = 0.18

[params.outage_duration_hr]
type = "float"
unit = "h"
description = "TIME-17-OUTAGE-LEDGER-01 outage duration"
min = 6.0
max = 6.0

[params.pump_capacity_m3_s]
type = "float"
unit = "m3/s"
description = "PUMP-17-STORM-01 pump capacity during backup operation"
min = 0.24
max = 0.24

[params.allowed_pump_runtime_hr]
type = "float"
unit = "h"
description = "Allowed PUMP-17-STORM-01 runtime during the outage scenario"
min = 3.2
max = 3.2

[params.available_storage_volume_m3]
type = "float"
unit = "m3"
description = "BASIN-17-WETWELL-01 available wet-well/storage volume"
min = 1250.0
max = 1250.0

[params.pump_total_head_m]
type = "float"
unit = "m"
description = "PUMP-17-STORM-01 total dynamic head"
min = 8.5
max = 8.5

[params.pump_efficiency]
type = "float"
description = "PUMP-17-STORM-01 source-owned pump efficiency"
min = 0.72
max = 0.72

[params.controls_load_kw]
type = "float"
unit = "kW"
description = "CTRL-17-RTU-01 controls load"
min = 1.8
max = 1.8

[params.telemetry_load_kw]
type = "float"
unit = "kW"
description = "CTRL-17-RTU-01 telemetry load"
min = 0.6
max = 0.6

[params.bess_nominal_kwh]
type = "float"
unit = "kWh"
description = "BESS-17-BACKUP-01 nominal energy"
min = 210.0
max = 210.0

[params.max_depth_of_discharge]
type = "float"
description = "BESS-17-BACKUP-01 maximum depth of discharge"
min = 0.82
max = 0.82

[params.inverter_efficiency]
type = "float"
description = "BESS-17-BACKUP-01 inverter efficiency"
min = 0.94
max = 0.94

[params.generator_kw]
type = "float"
unit = "kW"
description = "GEN-17-BACKUP-01 output during the outage scenario"
min = 42.0
max = 42.0

[params.generator_runtime_hr]
type = "float"
unit = "h"
description = "GEN-17-BACKUP-01 available runtime"
min = 2.0
max = 2.0

[params.feeder_voltage_v]
type = "float"
unit = "V"
description = "FEEDER-17-480V-01 nominal three-phase feeder voltage"
min = 480.0
max = 480.0

[params.feeder_length_m]
type = "float"
unit = "m"
description = "FEEDER-17-480V-01 one-way conductor length"
min = 185.0
max = 185.0

[params.feeder_current_a]
type = "float"
unit = "A"
description = "FEEDER-17-480V-01 operating current for voltage-drop check"
min = 68.0
max = 68.0

[params.conductor_resistance_ohm_km]
type = "float"
unit = "ohm/km"
description = "FEEDER-17-480V-01 source-owned conductor resistance"
min = 0.321
max = 0.321

[params.max_voltage_drop_percent]
type = "float"
unit = "%"
description = "FEEDER-17-480V-01 maximum allowed voltage drop"
min = 4.0
max = 4.0

[outputs.storm_inflow_volume_m3]
description = "Storm inflow volume during the outage"
tolerance = 0.03

[outputs.pumpable_volume_m3]
description = "Volume pumpable during allowed backup pump runtime"
tolerance = 0.03

[outputs.residual_storage_volume_m3]
description = "Storm volume remaining for storage after pumping"
tolerance = 0.03

[outputs.storage_margin_m3]
description = "Available storage minus residual storage volume"
tolerance = 0.03

[outputs.pump_hydraulic_power_kw]
description = "Hydraulic power for PUMP-17-STORM-01"
tolerance = 0.03

[outputs.pump_input_power_kw]
description = "Electrical input power for PUMP-17-STORM-01"
tolerance = 0.03

[outputs.critical_mixed_load_kw]
description = "Pump plus controls and telemetry mixed critical load"
tolerance = 0.03

[outputs.pump_energy_required_kwh]
description = "Pump energy required during allowed pump runtime"
tolerance = 0.03

[outputs.controls_energy_required_kwh]
description = "Controls and telemetry energy required across full outage"
tolerance = 0.03

[outputs.total_energy_required_kwh]
description = "Total backup energy required"
tolerance = 0.03

[outputs.usable_bess_energy_kwh]
description = "Usable BESS energy after depth-of-discharge and inverter efficiency"
tolerance = 0.03

[outputs.generator_energy_kwh]
description = "Backup generator energy available"
tolerance = 0.03

[outputs.backup_energy_available_kwh]
description = "Usable BESS energy plus generator energy"
tolerance = 0.03

[outputs.backup_energy_margin_kwh]
description = "Backup energy available minus total backup energy required"
tolerance = 0.03

[outputs.battery_only_mixed_load_runtime_hr]
description = "Runtime using BESS only at mixed pump, controls, and telemetry load"
tolerance = 0.03

[outputs.feeder_voltage_drop_percent]
description = "Source-owned three-phase feeder voltage-drop percentage"
tolerance = 0.03

[outputs.voltage_drop_margin_percent]
description = "Maximum allowed voltage drop minus calculated voltage drop"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when storage, backup energy, and voltage drop margins are non-negative"
tolerance = 0.001

[archetypes.ssc17_stormwater_pump_outage_case]
description = "Stormwater pump station outage case with wet-well storage, BESS, generator, controls load, and feeder voltage drop"
storm_inflow_m3_s = {min = 0.18, max = 0.18}
outage_duration_hr = {min = 6.0, max = 6.0}
pump_capacity_m3_s = {min = 0.24, max = 0.24}
allowed_pump_runtime_hr = {min = 3.2, max = 3.2}
available_storage_volume_m3 = {min = 1250.0, max = 1250.0}
pump_total_head_m = {min = 8.5, max = 8.5}
pump_efficiency = {min = 0.72, max = 0.72}
controls_load_kw = {min = 1.8, max = 1.8}
telemetry_load_kw = {min = 0.6, max = 0.6}
bess_nominal_kwh = {min = 210.0, max = 210.0}
max_depth_of_discharge = {min = 0.82, max = 0.82}
inverter_efficiency = {min = 0.94, max = 0.94}
generator_kw = {min = 42.0, max = 42.0}
generator_runtime_hr = {min = 2.0, max = 2.0}
feeder_voltage_v = {min = 480.0, max = 480.0}
feeder_length_m = {min = 185.0, max = 185.0}
feeder_current_a = {min = 68.0, max = 68.0}
conductor_resistance_ohm_km = {min = 0.321, max = 0.321}
max_voltage_drop_percent = {min = 4.0, max = 4.0}
site_contexts = ["stormwater-pumping-outage-resilience", "backup-energy-pump-control-check"]

[difficulty.easy]
description = "All source-pack values given for the SSC-17 stormwater pumping outage resilience package"
visibility = "all_given"
archetypes = ["ssc17_stormwater_pump_outage_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-17 stormwater pumping outage resilience package"
visibility = "all_given"
archetypes = ["ssc17_stormwater_pump_outage_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-17 stormwater pumping outage resilience package"
visibility = "all_given"
archetypes = ["ssc17_stormwater_pump_outage_case"]
