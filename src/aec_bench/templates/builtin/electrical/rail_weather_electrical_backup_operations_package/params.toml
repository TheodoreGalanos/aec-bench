[meta]
name = "rail-weather-electrical-backup-operations-package"
description = "SSC-17 rail weather electrical backup operations metrics"
long_description = "Calculates source-bound rail weather and backup operations metrics from a deterministic SSC-17 task-owned source pack. The template combines signalling and communications loads, weather heating, battery/generator energy, thermal rating, sag, feeder voltage drop, and an overall synthetic pass score."
discipline = "electrical"
category = "rail-weather-backup-energy"
standards = ["rail weather resilience workflows", "signalling backup energy workflows", "feeder and OLE capacity workflows"]
tags = ["electrical", "rail", "weather", "signalling", "backup", "feeder", "ole", "resilience", "deterministic"]
tool_mode = "with-tool"

[params.signal_load_kw]
type = "float"
unit = "kW"
description = "SIGNAL-SSC17-007 signal load"
min = 7.5
max = 7.5

[params.communications_load_kw]
type = "float"
unit = "kW"
description = "SIGNAL-SSC17-007 communications load"
min = 2.5
max = 2.5

[params.weather_heating_kw]
type = "float"
unit = "kW"
description = "WEATHER-SSC17-007 weather heating load"
min = 18.0
max = 18.0

[params.outage_duration_hr]
type = "float"
unit = "h"
description = "RULE-SSC17-007 outage duration"
min = 8.0
max = 8.0

[params.weather_heating_duration_hr]
type = "float"
unit = "h"
description = "WEATHER-SSC17-007 weather heating duration"
min = 3.0
max = 3.0

[params.battery_nominal_kwh]
type = "float"
unit = "kWh"
description = "FEEDER-SSC17-007 battery nominal energy"
min = 260.0
max = 260.0

[params.max_depth_of_discharge]
type = "float"
description = "FEEDER-SSC17-007 maximum depth of discharge"
min = 0.78
max = 0.78

[params.inverter_efficiency]
type = "float"
description = "FEEDER-SSC17-007 inverter efficiency"
min = 0.92
max = 0.92

[params.generator_kw]
type = "float"
unit = "kW"
description = "FEEDER-SSC17-007 generator output"
min = 30.0
max = 30.0

[params.generator_runtime_hr]
type = "float"
unit = "h"
description = "FEEDER-SSC17-007 generator runtime"
min = 2.0
max = 2.0

[params.derated_thermal_rating_a]
type = "float"
unit = "A"
description = "FEEDER-SSC17-007 derated thermal rating"
min = 420.0
max = 420.0

[params.operating_current_a]
type = "float"
unit = "A"
description = "FEEDER-SSC17-007 operating current"
min = 365.0
max = 365.0

[params.allowable_sag_m]
type = "float"
unit = "m"
description = "RAIL-SSC17-007 allowable sag"
min = 0.55
max = 0.55

[params.calculated_sag_m]
type = "float"
unit = "m"
description = "RAIL-SSC17-007 calculated sag"
min = 0.42
max = 0.42

[params.feeder_voltage_v]
type = "float"
unit = "V"
description = "FEEDER-SSC17-007 feeder voltage"
min = 650.0
max = 650.0

[params.feeder_length_m]
type = "float"
unit = "m"
description = "FEEDER-SSC17-007 feeder length"
min = 600.0
max = 600.0

[params.feeder_current_a]
type = "float"
unit = "A"
description = "FEEDER-SSC17-007 feeder current"
min = 38.0
max = 38.0

[params.conductor_resistance_ohm_km]
type = "float"
unit = "ohm/km"
description = "FEEDER-SSC17-007 conductor resistance"
min = 0.524
max = 0.524

[params.max_voltage_drop_percent]
type = "float"
unit = "%"
description = "FEEDER-SSC17-007 maximum voltage drop"
min = 5.0
max = 5.0

[outputs.signal_comms_load_kw]
description = "Signal plus communications load"
tolerance = 0.03

[outputs.weather_heating_energy_kwh]
description = "Weather heating energy required"
tolerance = 0.03

[outputs.required_backup_energy_kwh]
description = "Backup energy required"
tolerance = 0.03

[outputs.usable_battery_energy_kwh]
description = "Usable battery energy"
tolerance = 0.03

[outputs.generator_energy_kwh]
description = "Generator energy available"
tolerance = 0.03

[outputs.backup_energy_available_kwh]
description = "Battery plus generator energy available"
tolerance = 0.03

[outputs.backup_energy_margin_kwh]
description = "Available backup energy minus required backup energy"
tolerance = 0.03

[outputs.battery_only_runtime_hr]
description = "Battery-only runtime at signal plus communications load"
tolerance = 0.03

[outputs.thermal_rating_margin_a]
description = "Derated thermal rating minus operating current"
tolerance = 0.03

[outputs.sag_margin_m]
description = "Allowable sag minus calculated sag"
tolerance = 0.03

[outputs.feeder_voltage_drop_percent]
description = "Three-phase feeder voltage drop"
tolerance = 0.03

[outputs.voltage_drop_margin_percent]
description = "Maximum voltage drop minus calculated voltage drop"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when backup energy, thermal rating, sag, and voltage-drop checks pass"
tolerance = 0.001

[archetypes.ssc17_rail_weather_backup_case]
description = "Rail corridor weather and backup operations case with signalling load, heating load, backup energy, and feeder margins"
signal_load_kw = {min = 7.5, max = 7.5}
communications_load_kw = {min = 2.5, max = 2.5}
weather_heating_kw = {min = 18.0, max = 18.0}
outage_duration_hr = {min = 8.0, max = 8.0}
weather_heating_duration_hr = {min = 3.0, max = 3.0}
battery_nominal_kwh = {min = 260.0, max = 260.0}
max_depth_of_discharge = {min = 0.78, max = 0.78}
inverter_efficiency = {min = 0.92, max = 0.92}
generator_kw = {min = 30.0, max = 30.0}
generator_runtime_hr = {min = 2.0, max = 2.0}
derated_thermal_rating_a = {min = 420.0, max = 420.0}
operating_current_a = {min = 365.0, max = 365.0}
allowable_sag_m = {min = 0.55, max = 0.55}
calculated_sag_m = {min = 0.42, max = 0.42}
feeder_voltage_v = {min = 650.0, max = 650.0}
feeder_length_m = {min = 600.0, max = 600.0}
feeder_current_a = {min = 38.0, max = 38.0}
conductor_resistance_ohm_km = {min = 0.524, max = 0.524}
max_voltage_drop_percent = {min = 5.0, max = 5.0}
site_contexts = ["rail-weather-electrical-backup", "signal-heat-battery-feeder-check"]

[difficulty.easy]
description = "All source-pack values given for the SSC-17 rail weather backup operations package"
visibility = "all_given"
archetypes = ["ssc17_rail_weather_backup_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-17 rail weather backup operations package"
visibility = "all_given"
archetypes = ["ssc17_rail_weather_backup_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-17 rail weather backup operations package"
visibility = "all_given"
archetypes = ["ssc17_rail_weather_backup_case"]
