tolerance = 0.005

[outputs.total_network_load_mbps]
description = "Total ITS network load"
tolerance = 0.005

[outputs.poe_load_w]
description = "Total PoE-powered device load"
tolerance = 0.005

[outputs.poe_headroom_w]
description = "Remaining PoE budget headroom"
tolerance = 0.005

[outputs.fibre_loss_db]
description = "Total FIB-01 optical link loss"
tolerance = 0.005

[outputs.fibre_margin_db]
description = "FIB-01 optical budget margin"
tolerance = 0.005

[outputs.ups_energy_kwh]
description = "UPS energy required for the selected operating case"
tolerance = 0.005

[archetypes.ssc13_seed]
description = "SSC-13 task-owned synthetic road lighting, visual, ITS, CCTV, and communications package"
site_contexts = ["night-incident-road-visual-operations"]

[difficulty.easy]
description = "All source-pack values visible"
visibility = "all_given"
archetypes = ["ssc13_seed"]

[difficulty.medium]
description = "Same deterministic source-pack values with package-level aggregation"
visibility = "all_given"
archetypes = ["ssc13_seed"]

[difficulty.hard]
description = "Same deterministic source-pack values with cross-discipline handoff checks"
visibility = "all_given"
archetypes = ["ssc13_seed"]
