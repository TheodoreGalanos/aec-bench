[meta]
name = "road-visual-operations-package"
description = "SSC-13 lighting, CCTV, ITS, communications, and power package metrics"
long_description = "Calculates source-bound road visual operations metrics from a deterministic SSC-13 task-owned source pack. The template aggregates lighting grid illuminance, CCTV pixels-per-metre and retention storage, ITS network load, PoE headroom, fibre link margin, and UPS energy for a compact generated task instance."
discipline = "electrical"
category = "road-visual-operations"
standards = ["IEC 62676-4", "IEEE 802.3bt", "NTCIP", "MUTCD"]
tags = ["electrical", "lighting", "cctv", "its", "communications", "road", "deterministic"]
tool_mode = "with-tool"

[params.lighting_grid_lg01_lux]
type = "float"
unit = "lux"
description = "Lighting grid point LG-01 illuminance"
min = 18.4
max = 18.4

[params.lighting_grid_lg02_lux]
type = "float"
unit = "lux"
description = "Lighting grid point LG-02 illuminance"
min = 20.1
max = 20.1

