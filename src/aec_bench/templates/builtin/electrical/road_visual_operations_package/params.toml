type = "float"
unit = "lux"
description = "Lighting grid point LG-03 illuminance"
min = 19.7
max = 19.7

[params.lighting_grid_lg04_lux]
type = "float"
unit = "lux"
description = "Lighting grid point LG-04 illuminance"
min = 17.9
max = 17.9

[params.lighting_grid_lg05_lux]
type = "float"
unit = "lux"
description = "Lighting grid point LG-05 illuminance"
min = 16.8
max = 16.8

[params.lighting_grid_lg06_lux]
