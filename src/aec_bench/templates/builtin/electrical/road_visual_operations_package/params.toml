tolerance = 0.005

[outputs.cctv_02_pixels_per_meter]
description = "CCTV-02 target-zone pixel density"
tolerance = 0.005

[outputs.cctv_01_storage_tb]
description = "CCTV-01 retained video storage"
tolerance = 0.005

[outputs.cctv_02_storage_tb]
description = "CCTV-02 retained video storage"
tolerance = 0.005

[outputs.total_cctv_storage_tb]
