[meta]
name = "static-thermal-rating"
description = "Steady-state thermal rating (ampacity) of bare overhead conductors per IEEE 738"
long_description = "Determines the continuous current-carrying capacity (ampacity) of bare overhead conductors by solving the IEEE 738 steady-state heat balance equation: convective and radiative cooling must equal solar heat gain plus ohmic heating. Accounts for wind speed, solar radiation, conductor emissivity, and temperature-dependent air properties to rate transmission and distribution lines."
discipline = "electrical"
category = "thermal-rating"
standards = ["IEEE 738", "CIGRE TB 601"]
tags = ["electrical", "thermal-rating", "ampacity", "overhead-conductor", "deterministic"]
tool_mode = "with-tool"

[params.conductor_diameter_mm]
type = "float"
unit = "mm"
description = "Outer diameter of the bare overhead conductor"
min = 5.0
max = 50.0

[params.conductor_resistance_ohm_per_km]
type = "float"
unit = "ohm/km"
description = "AC resistance of conductor at 25 deg C"
min = 0.02
max = 1.5

[params.max_conductor_temp_c]
type = "float"
unit = "deg C"
description = "Maximum allowable conductor operating temperature"
min = 50.0
max = 150.0

[params.ambient_temp_c]
type = "float"
unit = "deg C"
description = "Ambient air temperature"
min = -10.0
max = 50.0

[params.wind_speed_m_s]
type = "float"
unit = "m/s"
description = "Wind speed perpendicular component"
min = 0.0
max = 15.0

[params.wind_angle_deg]
type = "float"
unit = "deg"
description = "Angle between wind direction and conductor axis (0 = parallel, 90 = perpendicular)"
min = 0.0
max = 90.0

[params.solar_radiation_w_m2]
type = "float"
unit = "W/m2"
description = "Total solar radiation intensity on surface normal to conductor"
min = 0.0
max = 1200.0

[params.emissivity]
type = "float"
description = "Conductor surface emissivity (0 = shiny new, 1 = fully weathered)"
min = 0.2
max = 0.9
default = 0.5
derivable_from = "archetype"

[params.absorptivity]
type = "float"
description = "Conductor surface solar absorptivity (0 = fully reflective, 1 = fully absorbing)"
min = 0.2
max = 0.9
default = 0.5
derivable_from = "archetype"

# --- Outputs ---

[outputs.convective_cooling_w_m]
description = "Convective heat loss per unit length (W/m)"
tolerance = 0.05

[outputs.radiative_cooling_w_m]
description = "Radiative heat loss per unit length (W/m)"
tolerance = 0.05

[outputs.solar_heat_gain_w_m]
description = "Solar heat gain per unit length (W/m)"
tolerance = 0.05

[outputs.ampacity_a]
description = "Steady-state ampacity (A)"
tolerance = 0.03

# --- Archetypes ---
# Overhead transmission line scenarios with typical conductor sizes and conditions.

[archetypes.light_distribution]
description = "Light distribution line with small new ACSR conductor (recently strung, minimal weathering)"
conductor_diameter_mm = {min = 5.0, max = 15.0}
conductor_resistance_ohm_per_km = {min = 0.5, max = 1.5}
max_conductor_temp_c = {min = 50.0, max = 80.0}
wind_speed_m_s = {min = 0.5, max = 5.0}
emissivity = {min = 0.23, max = 0.30}
absorptivity = {min = 0.23, max = 0.30}
site_contexts = ["regional-australia", "rural-new-zealand"]

[archetypes.medium_subtransmission]
description = "Subtransmission line with medium ACSR conductor aged in service (10+ years weathered surface)"
conductor_diameter_mm = {min = 15.0, max = 30.0}
conductor_resistance_ohm_per_km = {min = 0.1, max = 0.5}
max_conductor_temp_c = {min = 75.0, max = 100.0}
wind_speed_m_s = {min = 0.5, max = 8.0}
emissivity = {min = 0.7, max = 0.9}
absorptivity = {min = 0.7, max = 0.9}
site_contexts = ["sydney-western-corridor", "melbourne-northern-ring"]

[archetypes.heavy_transmission]
description = "High-voltage transmission line with large ACSR conductor aged in service (10+ years weathered surface)"
conductor_diameter_mm = {min = 25.0, max = 50.0}
conductor_resistance_ohm_per_km = {min = 0.02, max = 0.15}
max_conductor_temp_c = {min = 80.0, max = 150.0}
wind_speed_m_s = {min = 0.5, max = 15.0}
emissivity = {min = 0.7, max = 0.9}
absorptivity = {min = 0.7, max = 0.9}
site_contexts = ["hunter-valley-transmission", "queensland-powerlink"]

# --- Difficulty ---

[difficulty.easy]
description = "Low wind, no solar, all params given including emissivity and absorptivity"
visibility = "all_given"
archetypes = ["light_distribution", "medium_subtransmission"]
solar_radiation_w_m2 = [0.0]
wind_angle_deg = [90.0]

[difficulty.medium]
description = "Full weather conditions, all params given"
visibility = "all_given"
archetypes = ["light_distribution", "medium_subtransmission", "heavy_transmission"]

[difficulty.hard]
description = "Emissivity and absorptivity hidden, agent must infer from conductor age and conditions"
visibility = "partial"
hidden_params = ["emissivity", "absorptivity"]
replacement_text = "The line uses {{ archetype.description }} in the {{ archetype.site_context }} corridor"
archetypes = ["medium_subtransmission", "heavy_transmission"]
