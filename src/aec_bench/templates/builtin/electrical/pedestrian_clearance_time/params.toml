[meta]
name = "pedestrian-clearance-time"
description = "Pedestrian flashing clearance interval from crossing length"
long_description = "Calculates the pedestrian clearance interval for a signalised crossing from crosswalk length and assumed walking speed. The deterministic relation divides crossing distance by walking speed and reports both exact and whole-second rounded flashing clearance time."
discipline = "electrical"
category = "signal-timing"
standards = ["MUTCD", "AS 1742.14"]
tags = ["electrical", "traffic-signals", "pedestrian", "clearance-time", "signal-timing", "deterministic"]
tool_mode = "with-tool"

[params.crosswalk_length_m]
type = "float"
unit = "m"
description = "Crosswalk length"
min = 3
max = 60

[params.walking_speed_m_s]
type = "float"
unit = "m/s"
description = "Design pedestrian walking speed"
min = 0.6
max = 1.8

[outputs.pedestrian_clearance_time_s]
description = "Calculated pedestrian clearance time"
tolerance = 0.03

[outputs.pedestrian_clearance_rounded_s]
description = "Clearance time rounded up to a whole second"
tolerance = 0.01

[archetypes.short_crossing]
description = "Short urban pedestrian crossing"
crosswalk_length_m = {min = 3, max = 12}
walking_speed_m_s = {min = 1.0, max = 1.5}
site_contexts = ["urban-intersection", "local-street"]

[archetypes.wide_crossing]
description = "Wide arterial or staged crossing"
crosswalk_length_m = {min = 12, max = 35}
walking_speed_m_s = {min = 0.9, max = 1.3}
site_contexts = ["arterial-road", "transport-interchange"]

[archetypes.accessible_crossing]
description = "Accessible design crossing with slower walking speed"
crosswalk_length_m = {min = 8, max = 35}
walking_speed_m_s = {min = 0.6, max = 1.0}
site_contexts = ["hospital-precinct", "aged-care-frontage"]

[difficulty.easy]
description = "Short crossing with all inputs visible"
visibility = "all_given"
archetypes = ["short_crossing"]

[difficulty.medium]
description = "Urban or arterial crossing"
visibility = "all_given"
archetypes = ["short_crossing", "wide_crossing"]

[difficulty.hard]
description = "Walking speed hidden in accessibility context"
visibility = "partial"
hidden_params = ["walking_speed_m_s"]
replacement_text = "Use the design walking speed implied by {{ archetype.description }}."
archetypes = ["accessible_crossing"]
walking_speed_m_s = [0.8]
