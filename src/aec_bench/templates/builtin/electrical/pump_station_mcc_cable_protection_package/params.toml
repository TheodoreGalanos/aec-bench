[meta]
name = "pump-station-mcc-cable-protection-package"
description = "SSC-05 pump station MCC, motor current, cable ampacity, voltage-drop, and protection metrics"
long_description = "Calculates deterministic SSC-05 pump station MCC metrics from a task-owned synthetic source pack. The template combines pump motor current, starting current, cable ampacity derating, voltage drop, overload margin, short-circuit margin, and an overall synthetic pass score."
discipline = "electrical"
category = "pump-station-mcc-protection"
standards = ["MCC single-line review workflow", "AS/NZS 3008.1.1-style cable ampacity workflow", "SKM PowerTools-style protection workflow"]
tags = ["electrical", "pump-station", "mcc", "motor", "cable", "protection", "voltage-drop", "deterministic"]
tool_mode = "with-tool"

[params.pump_motor_kw]
type = "float"
unit = "kW"
description = "PUMP-05-SCHED-05 pump motor input basis"
min = 47.02609291601914
max = 47.02609291601914

[params.feeder_voltage_v]
type = "float"
unit = "V"
description = "MCC-05-SLD-05 three-phase feeder voltage"
min = 415.0
max = 415.0

[params.motor_efficiency]
type = "float"
description = "PUMP-05-SCHED-05 motor efficiency"
min = 0.91
max = 0.91

[params.motor_power_factor]
type = "float"
description = "PUMP-05-SCHED-05 motor power factor"
min = 0.88
max = 0.88

[params.starting_multiplier]
type = "float"
description = "DUTY-05-BASIS-05 motor starting current multiplier"
min = 5.0
max = 5.0

[params.base_cable_ampacity_a]
type = "float"
unit = "A"
description = "CABLE-05-PUMP-05 base cable ampacity"
min = 145.0
max = 145.0

[params.ambient_derating_factor]
type = "float"
description = "CABLE-05-PUMP-05 ambient derating factor"
min = 0.92
max = 0.92

[params.grouping_derating_factor]
type = "float"
description = "CABLE-05-PUMP-05 grouping derating factor"
min = 0.87
max = 0.87

[params.installation_derating_factor]
type = "float"
description = "CABLE-05-PUMP-05 installation derating factor"
min = 0.9655172413793103
max = 0.9655172413793103

[params.voltage_drop_mv_per_a_m]
type = "float"
unit = "mV/A/m"
description = "CABLE-05-PUMP-05 source-owned voltage-drop factor"
min = 0.6338278851695152
max = 0.6338278851695152

[params.feeder_length_m]
type = "float"
unit = "m"
description = "CABLE-05-PUMP-05 feeder route length"
min = 245.0
max = 245.0

[params.max_voltage_drop_percent]
type = "float"
unit = "%"
description = "DUTY-05-BASIS-05 maximum voltage drop"
min = 4.0
max = 4.0

[params.overload_setting_a]
type = "float"
unit = "A"
description = "PROT-05-SET-05 overload setting"
min = 99.0
max = 99.0

[params.available_fault_current_ka]
type = "float"
unit = "kA"
description = "PROT-05-SET-05 available fault current at the MCC"
min = 22.2
max = 22.2

[params.breaker_interrupt_rating_ka]
type = "float"
unit = "kA"
description = "PROT-05-SET-05 breaker interrupt rating"
min = 25.0
max = 25.0

[outputs.running_current_a]
description = "Pump motor running current"
tolerance = 0.03

[outputs.starting_current_a]
description = "Pump motor starting current"
tolerance = 0.03

[outputs.derated_cable_ampacity_a]
description = "Cable ampacity after derating factors"
tolerance = 0.03

[outputs.ampacity_margin_a]
description = "Derated cable ampacity minus running current"
tolerance = 0.03

[outputs.voltage_drop_percent]
description = "Pump feeder voltage drop"
tolerance = 0.03

[outputs.voltage_drop_margin_percent]
description = "Voltage-drop criterion minus calculated voltage drop"
tolerance = 0.03

[outputs.overload_setting_margin_a]
description = "Overload setting minus running current"
tolerance = 0.03

[outputs.short_circuit_margin_ka]
description = "Breaker interrupt rating minus available fault current"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when ampacity, voltage-drop, overload, and fault margins are non-negative"
tolerance = 0.001

[archetypes.ssc05_pump_mcc_case]
description = "Pump station MCC package tied to one pump schedule, single line, cable schedule, protection setting table, and power memo"
pump_motor_kw = {min = 47.02609291601914, max = 47.02609291601914}
feeder_voltage_v = {min = 415.0, max = 415.0}
motor_efficiency = {min = 0.91, max = 0.91}
motor_power_factor = {min = 0.88, max = 0.88}
starting_multiplier = {min = 5.0, max = 5.0}
base_cable_ampacity_a = {min = 145.0, max = 145.0}
ambient_derating_factor = {min = 0.92, max = 0.92}
grouping_derating_factor = {min = 0.87, max = 0.87}
installation_derating_factor = {min = 0.9655172413793103, max = 0.9655172413793103}
voltage_drop_mv_per_a_m = {min = 0.6338278851695152, max = 0.6338278851695152}
feeder_length_m = {min = 245.0, max = 245.0}
max_voltage_drop_percent = {min = 4.0, max = 4.0}
overload_setting_a = {min = 99.0, max = 99.0}
available_fault_current_ka = {min = 22.2, max = 22.2}
breaker_interrupt_rating_ka = {min = 25.0, max = 25.0}
site_contexts = ["pump-station-mcc-protection"]

[difficulty.easy]
description = "All source-pack values given for the SSC-05 pump station MCC package"
visibility = "all_given"
archetypes = ["ssc05_pump_mcc_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-05 pump station MCC package"
visibility = "all_given"
archetypes = ["ssc05_pump_mcc_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-05 pump station MCC package"
visibility = "all_given"
archetypes = ["ssc05_pump_mcc_case"]
