[meta]
name = "wind-load-conductor"
description = "Calculate wind load on an overhead conductor span"
long_description = "Calculates a reduced overhead conductor wind load using an explicit terrain height exponent, conductor diameter, drag coefficient, and span length. The template is a deterministic structural-loading calculation for line design screening."
discipline = "electrical"
category = "structural-loading"
standards = ["IEC 60826", "AS/NZS 7000"]
tags = ["electrical", "transmission-line", "wind-load", "conductor", "deterministic"]
tool_mode = "with-tool"

[params.wind_pressure_pa]
type = "float"
unit = "Pa"
description = "Reference wind pressure at 10 m"
min = 100
max = 2500

[params.conductor_diameter_mm]
type = "float"
unit = "mm"
description = "Conductor outside diameter"
min = 5
max = 80

[params.span_length_m]
type = "float"
unit = "m"
description = "Conductor span length"
min = 20
max = 800

[params.drag_coefficient]
type = "float"
unit = "-"
description = "Conductor drag coefficient"
min = 0.8
max = 1.5

[params.terrain_category]
type = "enum"
unit = "-"
description = "Reduced terrain category"
values = ["open", "suburban", "urban"]

[params.height_above_ground_m]
type = "float"
unit = "m"
description = "Conductor height above ground"
min = 5
max = 80

[outputs.height_adjusted_wind_pressure_pa]
description = "Wind pressure adjusted from 10 m to conductor height"
tolerance = 0.03

[outputs.wind_load_per_unit_length_n_m]
description = "Transverse wind load per metre of conductor"
tolerance = 0.03

[outputs.transverse_wind_load_n]
description = "Total transverse wind load over the span"
tolerance = 0.03

[archetypes.distribution_span]
description = "Distribution overhead line span"
wind_pressure_pa = {min = 250, max = 900}
conductor_diameter_mm = {min = 8, max = 25}
span_length_m = {min = 40, max = 150}
drag_coefficient = {min = 1.0, max = 1.2}
terrain_category = ["open", "suburban"]
height_above_ground_m = {min = 8, max = 18}
site_contexts = ["distribution-line", "overhead-conductor"]

[archetypes.transmission_span]
description = "Transmission overhead line span"
wind_pressure_pa = {min = 400, max = 1800}
conductor_diameter_mm = {min = 20, max = 50}
span_length_m = {min = 150, max = 600}
drag_coefficient = {min = 1.0, max = 1.3}
terrain_category = ["open", "suburban", "urban"]
height_above_ground_m = {min = 15, max = 60}
site_contexts = ["transmission-line", "overhead-conductor"]

[difficulty.easy]
description = "Distribution span with all values visible"
visibility = "all_given"
archetypes = ["distribution_span"]

[difficulty.medium]
description = "Overhead span selected from distribution or transmission cases"
visibility = "all_given"
archetypes = ["distribution_span", "transmission_span"]

[difficulty.hard]
description = "Transmission span with terrain category embedded in context"
visibility = "partial"
hidden_params = ["terrain_category"]
replacement_text = "Use the terrain category implied by {{ archetype.description }}."
archetypes = ["transmission_span"]
terrain_category = ["open"]
