[meta]
name = "mooring-line-capacity"
description = "Mooring line design tension and capacity margin calculation"
long_description = "Calculates design line tension from explicit mooring line tension, dynamic factor, and consequence factor, then compares the result with minimum breaking load. The template reports capacity margin, reserve capacity, utilisation, and a numeric pass flag."
discipline = "structural"
category = "marine-mooring"
standards = ["AS 4997", "BS 6349-4", "PIANC WG153"]
tags = ["structural", "marine", "mooring", "capacity", "deterministic"]
tool_mode = "with-tool"

[params.line_tension_kn]
type = "float"
unit = "kN"
description = "Characteristic mooring line tension"
min = 10.0
max = 5000.0

[params.dynamic_factor]
type = "float"
unit = "-"
description = "Dynamic amplification factor applied to line tension"
min = 1.0
max = 2.5

[params.consequence_factor]
type = "float"
unit = "-"
description = "Consequence factor applied to design tension"
min = 1.0
max = 2.0

[params.mbl_kn]
type = "float"
unit = "kN"
description = "Minimum breaking load of the mooring line"
min = 100.0
max = 20000.0

[outputs.design_tension_kn]
description = "Design mooring line tension"
tolerance = 0.03

[outputs.capacity_margin_ratio]
description = "Ratio of minimum breaking load to design tension"
tolerance = 0.03

[outputs.reserve_capacity_kn]
description = "Minimum breaking load minus design tension"
tolerance = 0.03

[outputs.utilisation_ratio]
description = "Ratio of design tension to minimum breaking load"
tolerance = 0.03

[outputs.passes_capacity_check]
description = "Numeric pass flag: 1 if design tension is within capacity, otherwise 0"
tolerance = 0.01

[archetypes.service_berth_line]
description = "Service berth mooring line capacity check"
line_tension_kn = {min = 50.0, max = 800.0}
dynamic_factor = {min = 1.05, max = 1.5}
consequence_factor = {min = 1.0, max = 1.3}
mbl_kn = {min = 500.0, max = 5000.0}
site_contexts = ["service-wharf", "ferry-terminal"]

[archetypes.bulk_berth_line]
description = "Bulk berth mooring line capacity check"
line_tension_kn = {min = 500.0, max = 3500.0}
dynamic_factor = {min = 1.1, max = 2.0}
consequence_factor = {min = 1.1, max = 1.6}
mbl_kn = {min = 4000.0, max = 18000.0}
site_contexts = ["bulk-export-berth", "industrial-port-wharf"]

[difficulty.easy]
description = "All parameters given for a service berth mooring line"
visibility = "all_given"
archetypes = ["service_berth_line"]

[difficulty.medium]
description = "All parameters given across service and bulk berth lines"
visibility = "all_given"
archetypes = ["service_berth_line", "bulk_berth_line"]

[difficulty.hard]
description = "All parameters given for a bulk berth mooring line"
visibility = "all_given"
archetypes = ["bulk_berth_line"]
