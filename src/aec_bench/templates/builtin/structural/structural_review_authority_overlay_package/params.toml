# ABOUTME: Defines the SSC-14 structural review packet and authority overlay template.
# ABOUTME: Pins one source index, load schedule, material certificate, and comment register source pack.

[meta]
name = "structural-review-authority-overlay-package"
description = "SSC-14 structural review packet, load combination, evidence, and comment metrics"
long_description = "Calculates source-bound structural review metrics from a deterministic SSC-14 task-owned source pack. The template combines ULS and SLS load combinations, capacity and deflection margins, material carbon-equivalent evidence, evidence completeness, review comment closeout, authority overlay count, and overall pass scoring."
discipline = "structural"
category = "structural-review"
standards = ["load-combination review", "material certificate check", "comment closeout", "authority overlay"]
tags = ["structural", "review", "authority", "load-combinations", "material-certificate", "comments", "deterministic"]
tool_mode = "with-tool"

[params.dead_load_kn]
type = "float"
unit = "kN"
description = "LOAD-SSC14-008 dead load"
min = 118.0
max = 118.0

[params.live_load_kn]
type = "float"
unit = "kN"
description = "LOAD-SSC14-008 live load"
min = 36.0
max = 36.0

[params.wind_load_kn]
type = "float"
unit = "kN"
description = "LOAD-SSC14-008 wind load"
min = 58.0
max = 58.0

[params.uls_dead_factor]
type = "float"
description = "LOAD-SSC14-008 ULS dead load factor"
min = 1.2
max = 1.2

[params.uls_live_factor]
type = "float"
description = "LOAD-SSC14-008 ULS live load factor"
min = 1.5
max = 1.5

[params.uls_wind_factor]
type = "float"
description = "LOAD-SSC14-008 ULS wind load factor"
min = 1.0
max = 1.0

[params.sls_wind_factor]
type = "float"
description = "LOAD-SSC14-008 SLS wind load factor"
min = 0.7
max = 0.7

[params.member_capacity_kn]
type = "float"
unit = "kN"
description = "INDEX-SSC14-008 member capacity from calculation appendix"
min = 260.0
max = 260.0

[params.sls_deflection_limit_mm]
type = "float"
unit = "mm"
description = "INDEX-SSC14-008 SLS deflection limit"
min = 18.0
max = 18.0

[params.calculated_sls_deflection_mm]
type = "float"
unit = "mm"
description = "INDEX-SSC14-008 calculated SLS deflection"
min = 14.2
max = 14.2

[params.carbon_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate carbon percentage"
min = 0.18
max = 0.18

[params.manganese_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate manganese percentage"
min = 1.3
max = 1.3

[params.chromium_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate chromium percentage"
min = 0.35
max = 0.35

[params.molybdenum_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate molybdenum percentage"
min = 0.05
max = 0.05

[params.vanadium_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate vanadium percentage"
min = 0.02
max = 0.02

[params.nickel_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate nickel percentage"
min = 0.2
max = 0.2

[params.copper_percent]
type = "float"
unit = "%"
description = "MAT-SSC14-008 material certificate copper percentage"
min = 0.25
max = 0.25

[params.carbon_equivalent_limit]
type = "float"
description = "MAT-SSC14-008 carbon equivalent limit for review acceptance"
min = 0.55
max = 0.55

[params.required_evidence_items]
type = "float"
unit = "count"
description = "INDEX-SSC14-008 required evidence item count"
min = 9.0
max = 9.0

[params.present_evidence_items]
type = "float"
unit = "count"
description = "INDEX-SSC14-008 present evidence item count"
min = 8.0
max = 8.0

[params.review_comment_count]
type = "float"
unit = "count"
description = "COMMENTS-SSC14-008 total review comments"
min = 12.0
max = 12.0

[params.closed_review_comment_count]
type = "float"
unit = "count"
description = "COMMENTS-SSC14-008 closed review comments"
min = 11.0
max = 11.0

[params.unresolved_critical_comments]
type = "float"
unit = "count"
description = "COMMENTS-SSC14-008 unresolved critical comments"
min = 0.0
max = 0.0

[params.authority_override_count]
type = "float"
unit = "count"
description = "COMMENTS-SSC14-008 authority override count recorded in the memo"
min = 1.0
max = 1.0

[params.minimum_evidence_percent]
type = "float"
unit = "%"
description = "MEMO-SSC14-008 minimum evidence completeness threshold"
min = 85.0
max = 85.0

[params.minimum_comment_closeout_percent]
type = "float"
unit = "%"
description = "MEMO-SSC14-008 minimum review comment closeout threshold"
min = 90.0
max = 90.0

[outputs.governing_uls_load_kn]
description = "ULS load combination"
tolerance = 0.03

[outputs.governing_sls_load_kn]
description = "SLS load combination"
tolerance = 0.03

[outputs.uls_capacity_margin_kn]
description = "Member capacity minus ULS demand"
tolerance = 0.03

[outputs.sls_deflection_margin_mm]
description = "SLS deflection limit minus calculated deflection"
tolerance = 0.03

[outputs.material_carbon_equivalent]
description = "IIW carbon equivalent from material certificate"
tolerance = 0.03

[outputs.carbon_equivalent_margin]
description = "Carbon equivalent limit minus calculated value"
tolerance = 0.03

[outputs.evidence_complete_percent]
description = "Present evidence items divided by required evidence items"
tolerance = 0.03

[outputs.comment_closeout_percent]
description = "Closed review comments divided by total review comments"
tolerance = 0.03

[outputs.unresolved_critical_comments]
description = "Unresolved critical review comments"
tolerance = 0.03

[outputs.authority_override_count]
description = "Authority override count named in the acceptance response"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when load, material, evidence, and comment checks pass"
tolerance = 0.03

[archetypes.ssc14_structural_review_case]
description = "Structural source index, load schedule, material certificate, and review comment source pack"
dead_load_kn = {min = 118.0, max = 118.0}
live_load_kn = {min = 36.0, max = 36.0}
wind_load_kn = {min = 58.0, max = 58.0}
uls_dead_factor = {min = 1.2, max = 1.2}
uls_live_factor = {min = 1.5, max = 1.5}
uls_wind_factor = {min = 1.0, max = 1.0}
sls_wind_factor = {min = 0.7, max = 0.7}
member_capacity_kn = {min = 260.0, max = 260.0}
sls_deflection_limit_mm = {min = 18.0, max = 18.0}
calculated_sls_deflection_mm = {min = 14.2, max = 14.2}
carbon_percent = {min = 0.18, max = 0.18}
manganese_percent = {min = 1.3, max = 1.3}
chromium_percent = {min = 0.35, max = 0.35}
molybdenum_percent = {min = 0.05, max = 0.05}
vanadium_percent = {min = 0.02, max = 0.02}
nickel_percent = {min = 0.2, max = 0.2}
copper_percent = {min = 0.25, max = 0.25}
carbon_equivalent_limit = {min = 0.55, max = 0.55}
required_evidence_items = {min = 9.0, max = 9.0}
present_evidence_items = {min = 8.0, max = 8.0}
review_comment_count = {min = 12.0, max = 12.0}
closed_review_comment_count = {min = 11.0, max = 11.0}
unresolved_critical_comments = {min = 0.0, max = 0.0}
authority_override_count = {min = 1.0, max = 1.0}
minimum_evidence_percent = {min = 85.0, max = 85.0}
minimum_comment_closeout_percent = {min = 90.0, max = 90.0}
site_contexts = ["structural-review", "authority-overlay", "comment-closeout"]

[difficulty.easy]
description = "All source-pack values given for the SSC-14 structural review package"
visibility = "all_given"
archetypes = ["ssc14_structural_review_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-14 structural review package"
visibility = "all_given"
archetypes = ["ssc14_structural_review_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-14 structural review package"
visibility = "all_given"
archetypes = ["ssc14_structural_review_case"]
