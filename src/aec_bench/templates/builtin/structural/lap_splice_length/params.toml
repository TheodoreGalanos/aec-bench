[meta]
name = "lap-splice-length"
description = "Reduced reinforcement lap splice length calculation"
long_description = "Calculates lap splice length from a provided development length and explicit splice, bar-location, and coating factors. The template rounds the required lap length up to the nearest 10 mm and compares it with a provided lap length."
discipline = "structural"
category = "rebar-detailing"
standards = ["ACI 318", "AS 3600"]
tags = ["structural", "rebar", "lap-splice", "detailing", "deterministic"]
tool_mode = "with-tool"

[params.development_length_mm]
type = "float"
unit = "mm"
description = "Base development length"
min = 100.0
max = 4000.0

[params.splice_class_factor]
type = "float"
unit = "-"
description = "Explicit splice class factor"
min = 0.5
max = 2.5

[params.bar_location_factor]
type = "float"
unit = "-"
description = "Explicit bar location factor"
min = 0.5
max = 2.0

[params.coating_factor]
type = "float"
unit = "-"
description = "Explicit coating factor"
min = 0.5
max = 2.0

[params.provided_lap_length_mm]
type = "float"
unit = "mm"
description = "Provided lap length to compare against the rounded requirement"
min = 0.0
max = 8000.0

[outputs.calculated_lap_length_mm]
description = "Calculated unrounded lap splice length"
tolerance = 0.03

[outputs.rounded_lap_length_mm]
description = "Required lap length rounded up to the nearest 10 mm"
tolerance = 0.01

[outputs.provided_margin_mm]
description = "Provided lap length minus rounded required lap length"
tolerance = 0.03

[outputs.provided_lap_satisfies]
description = "Numeric flag where 1 means the provided lap satisfies the requirement"
tolerance = 0.01

[archetypes.slab_rebar]
description = "Slab reinforcement lap splice check"
development_length_mm = {min = 300.0, max = 1600.0}
splice_class_factor = {min = 1.0, max = 1.6}
bar_location_factor = {min = 1.0, max = 1.3}
coating_factor = {min = 1.0, max = 1.5}
provided_lap_length_mm = {min = 400.0, max = 3000.0}
site_contexts = ["concrete-slab", "reinforcement-detailing"]

[archetypes.wall_rebar]
description = "Wall reinforcement lap splice check"
development_length_mm = {min = 500.0, max = 2500.0}
splice_class_factor = {min = 1.0, max = 1.8}
bar_location_factor = {min = 1.0, max = 1.4}
coating_factor = {min = 1.0, max = 1.5}
provided_lap_length_mm = {min = 700.0, max = 5000.0}
site_contexts = ["concrete-wall", "vertical-reinforcement"]

[difficulty.easy]
description = "All parameters given for slab reinforcement"
visibility = "all_given"
archetypes = ["slab_rebar"]

[difficulty.medium]
description = "All parameters given across reinforcement elements"
visibility = "all_given"
archetypes = ["slab_rebar", "wall_rebar"]

[difficulty.hard]
description = "All parameters given for wall reinforcement"
visibility = "all_given"
archetypes = ["wall_rebar"]

