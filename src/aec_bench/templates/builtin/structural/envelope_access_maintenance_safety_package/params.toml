[meta]
name = "envelope-access-maintenance-safety-package"
description = "SSC-09 envelope access, maintenance, and safety metrics"
long_description = "Calculates source-bound envelope access and maintenance safety metrics from a deterministic SSC-09 task-owned source pack. The template combines maintenance live load, support capacity, wind screen load, fall-arrest demand, access width, tolerance gap, and an overall synthetic pass score."
discipline = "structural"
category = "envelope-access-safety"
standards = ["maintenance access workflows", "fall arrest coordination", "envelope tolerance workflows"]
tags = ["structural", "envelope", "access", "maintenance", "fall-arrest", "wind", "tolerance", "deterministic"]
tool_mode = "with-tool"

[params.access_platform_area_m2]
type = "float"
unit = "m2"
description = "ACCESS-09-PLAN-03 access platform area"
min = 16.0
max = 16.0

[params.maintenance_live_load_kpa]
type = "float"
unit = "kPa"
description = "LOAD-09-MAINT-03 maintenance live load"
min = 2.5
max = 2.5

[params.access_support_capacity_kn]
type = "float"
unit = "kN"
description = "ANCH-09-ACCESS-03 access support capacity"
min = 55.0
max = 55.0

[params.wind_pressure_kpa]
type = "float"
unit = "kPa"
description = "WIND-09-WEATHER-03 wind screen pressure"
min = 1.2
max = 1.2

[params.wind_screen_area_m2]
type = "float"
unit = "m2"
description = "WIND-09-WEATHER-03 exposed screen area"
min = 12.0
max = 12.0

[params.wind_anchor_capacity_kn]
type = "float"
unit = "kN"
description = "ANCH-09-ACCESS-03 wind anchor capacity"
min = 20.0
max = 20.0

[params.fall_arrest_user_count]
type = "float"
description = "OPS-09-MAINT-03 fall-arrest user count"
min = 2.0
max = 2.0

[params.fall_arrest_load_kn_per_user]
type = "float"
unit = "kN"
description = "OPS-09-MAINT-03 fall-arrest load per user"
min = 6.0
max = 6.0

[params.fall_arrest_anchor_capacity_kn]
type = "float"
unit = "kN"
description = "ANCH-09-ACCESS-03 fall-arrest anchor capacity"
min = 16.0
max = 16.0

[params.access_clear_width_m]
type = "float"
unit = "m"
description = "ACCESS-09-PLAN-03 clear access width"
min = 0.85
max = 0.85

[params.required_access_width_m]
type = "float"
unit = "m"
description = "OPS-09-MAINT-03 required access width"
min = 0.75
max = 0.75

[params.measured_tolerance_gap_mm]
type = "float"
unit = "mm"
description = "LOAD-09-MAINT-03 measured tolerance gap"
min = 18.0
max = 18.0

[params.allowable_tolerance_gap_mm]
type = "float"
unit = "mm"
description = "LOAD-09-MAINT-03 allowable tolerance gap"
min = 25.0
max = 25.0

[outputs.maintenance_live_load_kn]
description = "Maintenance live load on access platform"
tolerance = 0.03

[outputs.maintenance_load_margin_kn]
description = "Access support capacity minus maintenance live load"
tolerance = 0.03

[outputs.wind_screen_load_kn]
description = "Wind load on exposed access screen"
tolerance = 0.03

[outputs.wind_anchor_margin_kn]
description = "Wind anchor capacity minus wind screen load"
tolerance = 0.03

[outputs.fall_arrest_demand_kn]
description = "Fall-arrest demand"
tolerance = 0.03

[outputs.fall_arrest_margin_kn]
description = "Fall-arrest anchor capacity minus demand"
tolerance = 0.03

[outputs.access_width_margin_m]
description = "Clear access width minus required width"
tolerance = 0.03

[outputs.tolerance_margin_mm]
description = "Allowable tolerance gap minus measured gap"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when load, wind, fall-arrest, access, and tolerance checks pass"
tolerance = 0.001

[archetypes.ssc09_envelope_access_safety_case]
description = "Envelope access and maintenance safety case"
access_platform_area_m2 = {min = 16.0, max = 16.0}
maintenance_live_load_kpa = {min = 2.5, max = 2.5}
access_support_capacity_kn = {min = 55.0, max = 55.0}
wind_pressure_kpa = {min = 1.2, max = 1.2}
wind_screen_area_m2 = {min = 12.0, max = 12.0}
wind_anchor_capacity_kn = {min = 20.0, max = 20.0}
fall_arrest_user_count = {min = 2.0, max = 2.0}
fall_arrest_load_kn_per_user = {min = 6.0, max = 6.0}
fall_arrest_anchor_capacity_kn = {min = 16.0, max = 16.0}
access_clear_width_m = {min = 0.85, max = 0.85}
required_access_width_m = {min = 0.75, max = 0.75}
measured_tolerance_gap_mm = {min = 18.0, max = 18.0}
allowable_tolerance_gap_mm = {min = 25.0, max = 25.0}

[difficulty.easy]
description = "All source-pack values given for the SSC-09 envelope access package"
visibility = "all_given"
archetypes = ["ssc09_envelope_access_safety_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-09 envelope access package"
visibility = "all_given"
archetypes = ["ssc09_envelope_access_safety_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-09 envelope access package"
visibility = "all_given"
archetypes = ["ssc09_envelope_access_safety_case"]
