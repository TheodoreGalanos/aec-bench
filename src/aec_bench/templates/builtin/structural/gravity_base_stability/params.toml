[meta]
name = "gravity-base-stability"
description = "Reduced gravity base eccentricity and bearing check"
long_description = "Calculates reduced gravity base foundation stability from vertical load, overturning moment, base geometry, and allowable bearing pressure. The template reports eccentricity, middle-third limit, maximum bearing pressure, bearing utilisation, and a numeric middle-third flag."
discipline = "structural"
category = "wind-turbine-foundations"
standards = ["AS 5100.3", "EN 1997-1"]
tags = ["structural", "foundation", "gravity-base", "stability", "deterministic"]
tool_mode = "with-tool"

[params.vertical_load_kn]
type = "float"
unit = "kN"
description = "Resultant vertical load"
min = 1.0
max = 1000000.0

[params.overturning_moment_knm]
type = "float"
unit = "kNm"
description = "Overturning moment about the base centroid"
min = 0.0
max = 10000000.0

[params.base_width_m]
type = "float"
unit = "m"
description = "Base width in the overturning direction"
min = 0.1
max = 100.0

[params.base_length_m]
type = "float"
unit = "m"
description = "Base length perpendicular to overturning direction"
min = 0.1
max = 100.0

[params.allowable_bearing_kpa]
type = "float"
unit = "kPa"
description = "Allowable bearing pressure"
min = 1.0
max = 5000.0

[outputs.eccentricity_m]
description = "Load eccentricity"
tolerance = 0.03

[outputs.middle_third_limit_m]
description = "Middle-third eccentricity limit"
tolerance = 0.03

[outputs.maximum_bearing_kpa]
description = "Maximum bearing pressure from linear bearing distribution"
tolerance = 0.03

[outputs.bearing_utilisation_ratio]
description = "Maximum bearing divided by allowable bearing pressure"
tolerance = 0.03

[outputs.middle_third_satisfied]
description = "Numeric flag where 1 means eccentricity is within the middle third"
tolerance = 0.01

[archetypes.equipment_block]
description = "Equipment foundation block stability check"
vertical_load_kn = {min = 100.0, max = 10000.0}
overturning_moment_knm = {min = 10.0, max = 5000.0}
base_width_m = {min = 1.0, max = 10.0}
base_length_m = {min = 1.0, max = 12.0}
allowable_bearing_kpa = {min = 100.0, max = 1000.0}
site_contexts = ["equipment-foundation", "plant-foundation"]

[archetypes.turbine_base]
description = "Wind turbine gravity base stability check"
vertical_load_kn = {min = 5000.0, max = 300000.0}
overturning_moment_knm = {min = 1000.0, max = 5000000.0}
base_width_m = {min = 5.0, max = 60.0}
base_length_m = {min = 5.0, max = 60.0}
allowable_bearing_kpa = {min = 100.0, max = 1500.0}
site_contexts = ["wind-turbine-foundation", "gravity-base"]

[difficulty.easy]
description = "All parameters given for an equipment foundation block"
visibility = "all_given"
archetypes = ["equipment_block"]

[difficulty.medium]
description = "All parameters given across gravity base foundations"
visibility = "all_given"
archetypes = ["equipment_block", "turbine_base"]

[difficulty.hard]
description = "All parameters given for wind turbine gravity bases"
visibility = "all_given"
archetypes = ["turbine_base"]

