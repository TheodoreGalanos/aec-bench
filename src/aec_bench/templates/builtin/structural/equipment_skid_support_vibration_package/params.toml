# ABOUTME: Defines the SSC-14 equipment skid support and vibration template.
# ABOUTME: Pins one equipment mass, foundation, isolator, fatigue, and support source pack.

[meta]
name = "equipment-skid-support-vibration-package"
description = "SSC-14 equipment skid support, foundation, vibration, and fatigue metrics"
long_description = "Calculates source-bound equipment skid support metrics from a deterministic SSC-14 task-owned source pack. The template combines support reaction, foundation bearing pressure, vibration transmissibility, fatigue damage screening, load-combination capacity margin, and overall pass scoring."
discipline = "structural"
category = "equipment-support"
standards = ["AS 4100", "ISO 10816", "Miner fatigue screening", "equipment support memo"]
tags = ["structural", "equipment", "skid", "support", "vibration", "fatigue", "foundation", "deterministic"]
tool_mode = "with-tool"

[params.equipment_mass_kg]
type = "float"
unit = "kg"
description = "MASS-SSC14-003 equipment operating mass"
min = 4200.0
max = 4200.0

[params.dynamic_allowance_factor]
type = "float"
description = "EQP-SSC14-003 dynamic allowance for support reaction"
min = 1.15
max = 1.15

[params.support_count]
type = "int"
description = "FDN-SSC14-003 active support count"
min = 4
max = 4

[params.reaction_load_factor]
type = "float"
description = "LC-SSC14-003 support reaction load factor"
min = 1.35
max = 1.35

[params.foundation_self_weight_kn]
type = "float"
unit = "kN"
description = "FDN-SSC14-003 equipment foundation self-weight"
min = 28.0
max = 28.0

[params.foundation_length_m]
type = "float"
unit = "m"
description = "FDN-SSC14-003 foundation length"
min = 2.4
max = 2.4

[params.foundation_width_m]
type = "float"
unit = "m"
description = "FDN-SSC14-003 foundation width"
min = 1.8
max = 1.8

[params.allowable_bearing_kpa]
type = "float"
unit = "kPa"
description = "FDN-SSC14-003 allowable foundation bearing pressure"
min = 180.0
max = 180.0

[params.operating_frequency_hz]
type = "float"
unit = "Hz"
description = "VIB-SSC14-003 operating frequency"
min = 24.0
max = 24.0

[params.support_natural_frequency_hz]
type = "float"
unit = "Hz"
description = "VIB-SSC14-003 support natural frequency"
min = 36.0
max = 36.0

[params.damping_ratio]
type = "float"
description = "VIB-SSC14-003 damping ratio"
min = 0.08
max = 0.08

[params.cycles_per_day]
type = "float"
unit = "cycles/day"
description = "VIB-SSC14-003 duty cycle count"
min = 18.0
max = 18.0

[params.design_life_days]
type = "float"
unit = "days"
description = "VIB-SSC14-003 design-life duration"
min = 7300.0
max = 7300.0

[params.stress_range_mpa]
type = "float"
unit = "MPa"
description = "VIB-SSC14-003 fatigue stress range"
min = 42.0
max = 42.0

[params.fatigue_constant]
type = "float"
description = "VIB-SSC14-003 source-owned fatigue constant"
min = 1200000000000.0
max = 1200000000000.0

[params.fatigue_exponent]
type = "float"
description = "VIB-SSC14-003 fatigue exponent"
min = 3.0
max = 3.0

[params.support_factored_capacity_kn]
type = "float"
unit = "kN"
description = "FDN-SSC14-003 support factored capacity"
min = 52.0
max = 52.0

[outputs.support_service_reaction_kn]
description = "Dynamic service support reaction per support"
tolerance = 0.03

[outputs.factored_support_reaction_kn]
description = "Factored support reaction per support"
tolerance = 0.03

[outputs.bearing_pressure_kpa]
description = "Service foundation bearing pressure"
tolerance = 0.03

[outputs.bearing_utilization]
description = "Bearing pressure divided by allowable bearing"
tolerance = 0.03

[outputs.frequency_ratio]
description = "Operating frequency divided by support natural frequency"
tolerance = 0.03

[outputs.vibration_transmissibility]
description = "Damped force transmissibility"
tolerance = 0.03

[outputs.transmitted_dynamic_force_kn]
description = "Support service reaction times transmissibility"
tolerance = 0.03

[outputs.fatigue_damage_ratio]
description = "Source-owned Miner fatigue damage ratio"
tolerance = 0.03

[outputs.load_combination_margin_kn]
description = "Support capacity minus factored support reaction"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when bearing, fatigue, and support capacity checks pass"
tolerance = 0.03

[archetypes.ssc14_equipment_skid_case]
description = "Equipment skid support, vibration, fatigue, and foundation source pack"
equipment_mass_kg = {min = 4200.0, max = 4200.0}
dynamic_allowance_factor = {min = 1.15, max = 1.15}
support_count = {min = 4, max = 4}
reaction_load_factor = {min = 1.35, max = 1.35}
foundation_self_weight_kn = {min = 28.0, max = 28.0}
foundation_length_m = {min = 2.4, max = 2.4}
foundation_width_m = {min = 1.8, max = 1.8}
allowable_bearing_kpa = {min = 180.0, max = 180.0}
operating_frequency_hz = {min = 24.0, max = 24.0}
support_natural_frequency_hz = {min = 36.0, max = 36.0}
damping_ratio = {min = 0.08, max = 0.08}
cycles_per_day = {min = 18.0, max = 18.0}
design_life_days = {min = 7300.0, max = 7300.0}
stress_range_mpa = {min = 42.0, max = 42.0}
fatigue_constant = {min = 1200000000000.0, max = 1200000000000.0}
fatigue_exponent = {min = 3.0, max = 3.0}
support_factored_capacity_kn = {min = 52.0, max = 52.0}
site_contexts = ["equipment-skid", "foundation-support", "vibration-fatigue"]

[difficulty.easy]
description = "All source-pack values given for the SSC-14 equipment support package"
visibility = "all_given"
archetypes = ["ssc14_equipment_skid_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-14 equipment support package"
visibility = "all_given"
archetypes = ["ssc14_equipment_skid_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-14 equipment support package"
visibility = "all_given"
archetypes = ["ssc14_equipment_skid_case"]
