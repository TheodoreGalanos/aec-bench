[meta]
name = "fos-seismic"
description = "Factor of safety under pseudo-static seismic loading using the infinite slope method"
long_description = "Computes the factor of safety for embankment or natural slopes subjected to earthquake inertia forces using the pseudo-static infinite slope method per USACE EM 1110-2-1902 and ICOLD Bulletin 148. Applies horizontal and vertical seismic coefficients to the sliding mass, accounts for pore water pressure via the pore pressure ratio ru, and derives the yield acceleration ky at which FoS reaches unity."
discipline = "civil"
category = "slope-stability"
standards = ["USACE EM 1110-2-1902", "ICOLD Bulletin 148"]
tags = ["civil", "dams", "slope-stability", "seismic", "pseudo-static", "geotechnical"]
tool_mode = "with-tool"

[params.slope_angle_deg]
type = "float"
unit = "degrees"
description = "Slope angle beta measured from horizontal"
min = 5
max = 45

[params.slip_depth_m]
type = "float"
unit = "m"
description = "Depth to the slip surface measured vertically from the slope face"
min = 1.0
max = 20.0

[params.cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion c' of the embankment material"
min = 0
max = 80
derivable_from = "archetype"

[params.friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle phi' of the embankment material"
min = 0
max = 45
derivable_from = "archetype"

[params.unit_weight_kn_m3]
type = "float"
unit = "kN/m³"
description = "Bulk unit weight of the embankment material gamma"
min = 16
max = 22
derivable_from = "archetype"

[params.pore_pressure_ratio]
type = "float"
description = "Pore pressure ratio ru = u / (gamma * z * cos²β)"
min = 0.0
max = 0.5

[params.kh]
type = "float"
description = "Horizontal seismic coefficient (fraction of g)"
min = 0.05
max = 0.40

[params.kv]
type = "float"
description = "Vertical seismic coefficient (fraction of g, acts upward for conservative case)"
min = 0.0
max = 0.20
optional = true

[outputs.fos]
description = "Factor of safety under pseudo-static seismic loading (dimensionless)"
tolerance = 0.03

[outputs.yield_acceleration_ky]
description = "Yield (critical) horizontal acceleration at which FoS = 1.0 (fraction of g)"
tolerance = 0.03

[outputs.yield_ratio]
description = "Yield acceleration ratio ky / kh (dimensionless)"
tolerance = 0.03

# --- Archetypes ---

[archetypes.homogeneous_earth_dam]
description = "Homogeneous earth dam with compacted clay core"
cohesion_kpa = {min = 15, max = 40}
friction_angle_deg = {min = 18, max = 28}
unit_weight_kn_m3 = {min = 18, max = 20}
slope_angle_deg = {min = 15, max = 25}
pore_pressure_ratio = {min = 0.1, max = 0.3}
kh = {min = 0.05, max = 0.15}
kv = {min = 0.0, max = 0.05}
site_contexts = ["snowy-mountains-dam", "wivenhoe-spillway", "warragamba-embankment"]

[archetypes.zoned_rockfill_dam]
description = "Zoned rockfill dam with gravel shell"
cohesion_kpa = {min = 0, max = 10}
friction_angle_deg = {min = 35, max = 45}
unit_weight_kn_m3 = {min = 19, max = 22}
slope_angle_deg = {min = 20, max = 35}
pore_pressure_ratio = {min = 0.0, max = 0.15}
kh = {min = 0.05, max = 0.20}
kv = {min = 0.0, max = 0.10}
site_contexts = ["thomson-dam-gippsland", "hinze-dam-gold-coast", "cotter-dam-act"]

[archetypes.tailings_dam]
description = "Tailings storage facility embankment with mine waste fill"
cohesion_kpa = {min = 5, max = 20}
friction_angle_deg = {min = 20, max = 30}
unit_weight_kn_m3 = {min = 17, max = 20}
slope_angle_deg = {min = 10, max = 20}
pore_pressure_ratio = {min = 0.2, max = 0.45}
kh = {min = 0.08, max = 0.25}
kv = {min = 0.0, max = 0.08}
site_contexts = ["bowen-basin-tsf", "kalgoorlie-tailings", "hunter-valley-tsf"]

[archetypes.road_embankment_seismic]
description = "Road embankment in a moderate seismic zone"
cohesion_kpa = {min = 5, max = 25}
friction_angle_deg = {min = 25, max = 35}
unit_weight_kn_m3 = {min = 18, max = 21}
slope_angle_deg = {min = 18, max = 30}
pore_pressure_ratio = {min = 0.0, max = 0.2}
kh = {min = 0.10, max = 0.30}
kv = {min = 0.0, max = 0.15}
site_contexts = ["newcastle-road-embankment", "adelaide-hills-embankment", "launceston-highway"]

[archetypes.natural_slope_seismic]
description = "Natural hillside slope in a seismically active region"
cohesion_kpa = {min = 0, max = 15}
friction_angle_deg = {min = 28, max = 40}
unit_weight_kn_m3 = {min = 17, max = 20}
slope_angle_deg = {min = 20, max = 40}
pore_pressure_ratio = {min = 0.0, max = 0.3}
kh = {min = 0.10, max = 0.35}
kv = {min = 0.0, max = 0.15}
site_contexts = ["blue-mountains-escarpment", "cairns-range-hillside", "otway-ranges-slope"]

[archetypes.levee_seismic]
description = "River levee under earthquake loading"
cohesion_kpa = {min = 10, max = 30}
friction_angle_deg = {min = 20, max = 30}
unit_weight_kn_m3 = {min = 17, max = 19}
slope_angle_deg = {min = 10, max = 20}
pore_pressure_ratio = {min = 0.15, max = 0.40}
kh = {min = 0.05, max = 0.20}
kv = {min = 0.0, max = 0.08}
site_contexts = ["murray-river-levee", "fitzroy-river-levee", "hawkesbury-river-levee"]

# --- Difficulty presets ---

[difficulty.easy]
description = "Dry cohesionless slope with no vertical seismic coefficient — simplest case"
visibility = "all_given"
archetypes = ["zoned_rockfill_dam", "road_embankment_seismic", "natural_slope_seismic"]
pore_pressure_ratio = [0.0]
kv = [0.0]

[difficulty.medium]
description = "Embankment with pore pressure and cohesion, all parameters given"
visibility = "all_given"
archetypes = ["homogeneous_earth_dam", "tailings_dam", "road_embankment_seismic", "levee_seismic", "zoned_rockfill_dam", "natural_slope_seismic"]

[difficulty.hard]
description = "Material properties hidden; agent infers from embankment description and site context"
visibility = "partial"
hidden_params = ["cohesion_kpa", "friction_angle_deg", "unit_weight_kn_m3"]
replacement_text = "The embankment is a {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["homogeneous_earth_dam", "tailings_dam", "levee_seismic", "natural_slope_seismic"]
