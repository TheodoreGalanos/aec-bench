[meta]
name = "culvert-driveway-access-safety-continuity-package"
description = "SSC-01 culvert driveway access and safety continuity metrics"
long_description = "Calculates task-owned synthetic SSC-01 driveway grade, culvert capacity, freeboard, roadway spread, and sight-distance metrics for one road access case."
discipline = "civil"
category = "road-resilience"
standards = ["FHWA HEC-22", "AASHTO Green Book", "culvert design workflow"]
tags = ["civil", "road", "culvert", "driveway", "access", "sight-distance", "deterministic"]
tool_mode = "with-tool"

[params.driveway_low_level_m]
type = "float"
unit = "m"
description = "ACCESS-SSC01-006 driveway low point level"
min = 42.2
max = 42.2

[params.driveway_high_level_m]
type = "float"
unit = "m"
description = "ACCESS-SSC01-006 driveway tie-in high point level"
min = 42.8
max = 42.8

[params.driveway_length_m]
type = "float"
unit = "m"
description = "ACCESS-SSC01-006 driveway grade length"
min = 18.0
max = 18.0

[params.allowable_driveway_grade_pct]
type = "float"
unit = "%"
description = "MEMO-SSC01-006 allowable driveway grade"
min = 8.0
max = 8.0

[params.culvert_diameter_m]
type = "float"
unit = "m"
description = "CULV-SSC01-006 culvert diameter"
min = 0.75
max = 0.75

[params.culvert_mannings_n]
type = "float"
description = "CULV-SSC01-006 culvert Manning roughness"
min = 0.013
max = 0.013

[params.culvert_slope_pct]
type = "float"
unit = "%"
description = "CULV-SSC01-006 culvert slope"
min = 1.0
max = 1.0

[params.design_flow_m3_s]
type = "float"
unit = "m3/s"
description = "CULV-SSC01-006 design flow"
min = 0.82
max = 0.82

[params.tailwater_level_m]
type = "float"
unit = "m"
description = "TAIL-SSC01-006 tailwater level"
min = 41.95
max = 41.95

[params.headwater_base_depth_m]
type = "float"
unit = "m"
description = "TAIL-SSC01-006 base headwater depth allowance"
min = 0.42
max = 0.42

[params.headwater_loss_factor_m]
type = "float"
unit = "m"
description = "TAIL-SSC01-006 ratio-squared headwater loss factor"
min = 0.25
max = 0.25

[params.road_edge_level_m]
type = "float"
unit = "m"
description = "ACCESS-SSC01-006 road edge level to remain clear"
min = 42.65
max = 42.65

[params.minimum_freeboard_m]
type = "float"
unit = "m"
description = "MEMO-SSC01-006 minimum freeboard"
min = 0.10
max = 0.10

[params.gutter_flow_m3_s]
type = "float"
unit = "m3/s"
description = "ACCESS-SSC01-006 gutter flow across driveway path"
min = 0.12
max = 0.12

[params.cross_slope_pct]
type = "float"
unit = "%"
description = "ACCESS-SSC01-006 cross slope"
min = 2.0
max = 2.0

[params.longitudinal_slope_pct]
type = "float"
unit = "%"
description = "ACCESS-SSC01-006 longitudinal slope"
min = 1.2
max = 1.2

[params.gutter_mannings_n]
type = "float"
description = "ACCESS-SSC01-006 gutter Manning roughness"
min = 0.016
max = 0.016

[params.allowable_spread_m]
type = "float"
unit = "m"
description = "MEMO-SSC01-006 allowable spread across driveway path"
min = 4.0
max = 4.0

[params.access_speed_kmh]
type = "float"
unit = "km/h"
description = "SIGHT-SSC01-006 access sight-distance speed"
min = 40.0
max = 40.0

[params.sight_reaction_time_s]
type = "float"
unit = "s"
description = "SIGHT-SSC01-006 sight-distance reaction time"
min = 2.5
max = 2.5

[params.braking_friction_coefficient]
type = "float"
description = "SIGHT-SSC01-006 braking friction coefficient"
min = 0.35
max = 0.35

[params.access_grade_pct]
type = "float"
unit = "%"
description = "SIGHT-SSC01-006 signed access grade"
min = 4.0
max = 4.0

[params.available_sight_distance_m]
type = "float"
unit = "m"
description = "SIGHT-SSC01-006 available sight distance"
min = 120.0
max = 120.0

[outputs.driveway_grade_percent]
description = "Computed driveway grade"
tolerance = 0.03

[outputs.driveway_grade_margin_percent]
description = "Allowable grade minus computed grade"
tolerance = 0.03

[outputs.culvert_capacity_m3_s]
description = "Full-pipe culvert capacity"
tolerance = 0.03

[outputs.culvert_capacity_margin_m3_s]
description = "Culvert capacity minus design flow"
tolerance = 0.03

[outputs.headwater_level_m]
description = "Synthetic headwater level"
tolerance = 0.03

[outputs.freeboard_m]
description = "Road edge level minus headwater level"
tolerance = 0.03

[outputs.freeboard_margin_m]
description = "Freeboard minus minimum freeboard"
tolerance = 0.03

[outputs.roadway_spread_m]
description = "Triangular-gutter spread across the access path"
tolerance = 0.03

[outputs.spread_margin_m]
description = "Allowable spread minus computed spread"
tolerance = 0.03

[outputs.sight_distance_required_m]
description = "Grade-adjusted sight distance required"
tolerance = 0.03

[outputs.sight_distance_margin_m]
description = "Available sight distance minus required sight distance"
tolerance = 0.03

[outputs.overall_pass_score]
description = "1.0 when access grade, culvert, freeboard, spread, and sight-distance checks pass"
tolerance = 0.01

[archetypes.ssc01_culvert_driveway_access]
description = "SSC-01 task-owned synthetic culvert driveway access safety package"
site_contexts = ["culvert-driveway-access-safety-continuity"]

[difficulty.easy]
description = "All source-pack values visible"
visibility = "all_given"
archetypes = ["ssc01_culvert_driveway_access"]

[difficulty.medium]
description = "Same deterministic source-pack values with package-level aggregation"
visibility = "all_given"
archetypes = ["ssc01_culvert_driveway_access"]

[difficulty.hard]
description = "Same deterministic source-pack values with cross-discipline handoff checks"
visibility = "all_given"
archetypes = ["ssc01_culvert_driveway_access"]
