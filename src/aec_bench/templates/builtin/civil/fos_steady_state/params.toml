[meta]
name = "fos-steady-state"
description = "Factor of safety for embankment slope under steady-state seepage"
long_description = "Computes the factor of safety against shallow translational failure on an embankment dam slope under steady-state seepage using the infinite slope method. The pore pressure ratio (ru) represents the phreatic surface location, and the balance of driving shear stress against Mohr-Coulomb resisting strength along the failure plane determines stability. Applicable to preliminary dam safety assessments per USACE EM 1110-2-1902 and ANCOLD guidelines."
discipline = "civil"
category = "slope-stability"
standards = ["USACE EM 1110-2-1902", "ANCOLD Guidelines on Design Criteria"]
tags = ["civil", "dams", "slope-stability", "seepage", "embankment", "deterministic"]
tool_mode = "with-tool"

[params.slope_angle_deg]
type = "float"
unit = "degrees"
description = "Embankment slope angle beta measured from horizontal"
min = 5.0
max = 45.0

[params.failure_depth_m]
type = "float"
unit = "m"
description = "Depth from slope surface to the failure plane z"
min = 0.5
max = 10.0

[params.cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion of embankment fill c'"
min = 0.0
max = 50.0
derivable_from = "archetype"

[params.friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle of embankment fill phi'"
min = 10.0
max = 45.0
derivable_from = "archetype"

[params.saturated_unit_weight_kn_m3]
type = "float"
unit = "kN/m³"
description = "Saturated unit weight of embankment fill gamma_sat"
min = 17.0
max = 23.0
derivable_from = "archetype"

[params.pore_pressure_ratio]
type = "float"
description = "Pore pressure ratio ru = u / (gamma_sat * z) representing steady-state phreatic surface"
min = 0.0
max = 0.60

# --- Outputs ---

[outputs.fos]
description = "Factor of safety against slope failure FoS (dimensionless)"
tolerance = 0.03

[outputs.driving_stress_kpa]
description = "Driving shear stress along the failure plane tau_d (kPa)"
tolerance = 0.03

[outputs.resisting_stress_kpa]
description = "Resisting shear stress along the failure plane tau_r (kPa)"
tolerance = 0.03

# --- Archetypes (embankment fill materials) ---

[archetypes.compacted_clay_core]
description = "Compacted clay core zone of a zoned earth dam"
cohesion_kpa = {min = 10.0, max = 30.0}
friction_angle_deg = {min = 18.0, max = 26.0}
saturated_unit_weight_kn_m3 = {min = 19.0, max = 21.0}
site_contexts = ["warragamba-dam-nsw", "hume-dam-nsw-vic", "dartmouth-dam-vic"]

[archetypes.compacted_sandy_gravel_shell]
description = "Compacted sandy gravel shell zone of a zoned earth dam"
cohesion_kpa = {min = 0.0, max = 5.0}
friction_angle_deg = {min = 34.0, max = 40.0}
saturated_unit_weight_kn_m3 = {min = 20.0, max = 22.0}
site_contexts = ["eildon-dam-vic", "burdekin-falls-dam-qld", "cotter-dam-act"]

[archetypes.homogeneous_earth_fill]
description = "Homogeneous earth fill embankment of a small to medium farm dam"
cohesion_kpa = {min = 5.0, max = 20.0}
friction_angle_deg = {min = 22.0, max = 30.0}
saturated_unit_weight_kn_m3 = {min = 18.0, max = 20.0}
site_contexts = ["darling-downs-farm-dam-qld", "goulburn-valley-irrigation-dam-vic", "hunter-valley-farm-dam-nsw"]

[archetypes.laterite_residual]
description = "Laterite residual soil fill used in tropical dam embankments"
cohesion_kpa = {min = 8.0, max = 25.0}
friction_angle_deg = {min = 20.0, max = 28.0}
saturated_unit_weight_kn_m3 = {min = 18.0, max = 21.0}
site_contexts = ["ross-river-dam-qld", "tinaroo-falls-dam-qld"]

[archetypes.weathered_rock_fill]
description = "Weathered rock fill placed in the outer shell of a dam embankment"
cohesion_kpa = {min = 0.0, max = 5.0}
friction_angle_deg = {min = 36.0, max = 44.0}
saturated_unit_weight_kn_m3 = {min = 20.0, max = 23.0}
site_contexts = ["thomson-dam-vic", "copeton-dam-nsw", "hinze-dam-qld"]

[archetypes.silty_sand_fill]
description = "Silty sand fill used in homogeneous tailings dam embankments"
cohesion_kpa = {min = 2.0, max = 10.0}
friction_angle_deg = {min = 26.0, max = 33.0}
saturated_unit_weight_kn_m3 = {min = 18.0, max = 20.0}
site_contexts = ["bowen-basin-tailings-dam-qld", "hunter-valley-tailings-dam-nsw"]

# --- Difficulty presets ---

[difficulty.easy]
description = "Dry slope (ru=0), granular fill with no cohesion — simplest formula variant"
visibility = "all_given"
archetypes = ["compacted_sandy_gravel_shell", "weathered_rock_fill"]
pore_pressure_ratio = [0.0]
cohesion_kpa = [0]

[difficulty.medium]
description = "Seepage present (ru > 0) with cohesive fill — full formula with all parameters given"
visibility = "all_given"
archetypes = ["compacted_clay_core", "homogeneous_earth_fill", "laterite_residual", "silty_sand_fill", "compacted_sandy_gravel_shell", "weathered_rock_fill"]

[difficulty.hard]
description = "Seepage present, soil properties hidden — agent must infer from site context and fill description"
visibility = "partial"
hidden_params = ["cohesion_kpa", "friction_angle_deg", "saturated_unit_weight_kn_m3"]
replacement_text = "The embankment fill is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["compacted_clay_core", "homogeneous_earth_fill", "laterite_residual", "silty_sand_fill"]
