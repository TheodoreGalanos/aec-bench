[meta]
name = "corridor-comment-response-issue-review-package"
description = "SSC-01 review-first issue-readiness review of a multimodal corridor comment response"
long_description = "Review-native long-horizon task over a generated SSC-01 multimodal corridor comment-response packet. The agent receives a multi-file source packet in /workspace/sources/ (document register, comment register, marked-up plan, drainage recalculation, signal and pedestrian recalculation, VMS operations note, electrical feeder check, and criteria/comments), inventories it, preserves corridor identity, recomputes the package's own chainage, drainage, pedestrian, VMS, voltage-drop, and closeout evidence, assigns one status per review item, raises findings/information requests/actions, and issues a readiness decision. Packet variants inject missing revised chainage evidence, stale change-register revisions, chainage identity mismatch, scenario copy-forward, open comments, carried comments, or a genuine unsupported downstream repair. Scored by a stage-gated custom verifier, not per-key answer matching."
discipline = "civil"
category = "road-review"
standards = ["corridor review workflow", "FHWA MUTCD", "drainage design workflow"]
tags = ["civil", "road", "review", "issue-readiness", "corridor", "drainage", "signals", "vms", "power"]
tool_mode = "no-tool"

# --- Corridor change basis ---

[params.original_chainage_m]
type = "float"
unit = "m"
description = "C-008 original comment chainage on RD-SSC01-001"
min = 1120.0
max = 1620.0

[params.chainage_delta_m]
type = "float"
unit = "m"
description = "Derived comment chainage movement from markup to revised package"
min = 5.0
max = 30.0

# --- Drainage recalc ---

[params.revised_hgl_m]
type = "float"
unit = "m AHD"
description = "DRN-08 revised HGL for the comment-response location"
min = 18.0
max = 48.0

[params.minimum_hgl_clearance_mm]
type = "float"
unit = "mm"
description = "Criteria minimum road level to HGL clearance"
min = 125.0
max = 250.0

[params.hgl_clearance_margin_mm]
type = "float"
unit = "mm"
description = "Hidden derivation margin between revised clearance and required HGL clearance"
min = 60.0
max = 260.0

# --- Signal and pedestrian recalc ---

[params.pedestrian_startup_time_s]
type = "float"
unit = "s"
description = "SG-08 pedestrian startup allowance"
min = 3.0
max = 4.0

[params.revised_crossing_width_m]
type = "float"
unit = "m"
description = "SG-08 revised pedestrian crossing width"
min = 12.0
max = 24.0

[params.pedestrian_walk_speed_m_s]
type = "float"
unit = "m/s"
description = "SG-08 pedestrian walking speed"
min = 1.0
max = 1.3

[params.ped_clearance_margin_s]
type = "float"
unit = "s"
description = "Hidden derivation margin between available and required pedestrian clearance"
min = 1.0
max = 5.0

# --- VMS operations note ---

[params.vms_character_height_in]
type = "enum"
unit = "in"
description = "VMS-08 revised character height"
values = ["10.0", "12.0", "14.0"]

[params.approach_speed_kmh]
type = "float"
unit = "km/h"
description = "CASE-08 approach speed used for VMS reading-time check"
min = 40.0
max = 60.0

[params.reading_rate_chars_s]
type = "float"
unit = "chars/s"
description = "CASE-08 accepted VMS reading rate"
min = 3.5
max = 4.5

[params.vms_message_margin_chars]
type = "float"
unit = "chars"
description = "Hidden derivation margin between readable VMS capacity and message length"
min = 2.0
max = 10.0

# --- Electrical feeder check ---

[params.revised_device_load_w]
type = "float"
unit = "W"
description = "FEED-08 revised connected load after comment-response changes"
min = 1200.0
max = 3200.0

[params.feeder_length_km]
type = "float"
unit = "km"
description = "FEED-08 route length"
min = 0.2
max = 0.7

[params.conductor_resistance_ohm_km]
type = "float"
unit = "ohm/km"
description = "FEED-08 conductor resistance"
min = 0.8
max = 1.6

[params.feeder_voltage_v]
type = "enum"
unit = "V"
description = "FEED-08 nominal feeder voltage"
values = ["230.0"]

[params.power_factor]
type = "float"
description = "FEED-08 load power factor"
min = 0.85
max = 0.95

[params.voltage_drop_margin_percent]
type = "float"
unit = "%"
description = "Hidden derivation margin between computed and allowable voltage drop"
min = 0.8
max = 4.0

[params.voltage_drop_deficit_percent]
type = "float"
unit = "%"
description = "Hidden derivation deficit for the unsupported-downstream-repair variant"
min = 0.1
max = 0.5

# --- Comment register ---

[params.review_comments_total]
type = "int"
description = "CMT-SSC01-008 total comments in the response batch"
min = 5
max = 8

[params.impacted_calculation_count]
type = "int"
description = "CMT-SSC01-008 count of calculations touched by the review change"
min = 4
max = 7

[params.packet_variant]
type = "enum"
description = "Hidden packet-defect variant controlling gold review statuses"
values = [
  "clean",
  "missing_revised_chainage",
  "stale_change_register_revision",
  "chainage_identity_mismatch",
  "scenario_copy_forward",
  "open_critical_comment",
  "minor_open_comment_carried",
  "unsupported_downstream_repair",
]

# --- Outputs (review gold state and evidence) ---

[outputs.rlr_01_status]
description = "Packet completeness status code (0 pass, 1 fail, 2 not applicable, 3 insufficient data)"
tolerance = 0.0

[outputs.rlr_02_status]
description = "Object identity status code"
tolerance = 0.0

[outputs.rlr_03_status]
description = "Review-response basis status code"
tolerance = 0.0

[outputs.rlr_04_status]
description = "Review-response adequacy status code"
tolerance = 0.0

[outputs.rlr_05_status]
description = "Scenario consequence status code"
tolerance = 0.0

[outputs.rlr_06_status]
description = "Secondary-discipline resilience status code"
tolerance = 0.0

[outputs.rlr_07_status]
description = "Comment and action closure status code"
tolerance = 0.0

[outputs.rlr_08_status]
description = "Readiness decision consistency status code"
tolerance = 0.0

[outputs.rlr_09_status]
description = "Claim boundary status code"
tolerance = 0.0

[outputs.readiness_code]
description = "Gold readiness decision (0 ready, 1 ready with carried actions, 2 not ready)"
tolerance = 0.0

[outputs.required_findings_count]
description = "Findings the review must raise"
tolerance = 0.0

[outputs.required_information_requests_count]
description = "Information requests the review must raise"
tolerance = 0.0

[outputs.required_carried_actions_count]
description = "Carried actions the review must record"
tolerance = 0.0

[outputs.changed_chainage_delta_m]
description = "Revised comment chainage minus original comment chainage"
tolerance = 0.02

[outputs.hgl_clearance_mm]
description = "Revised road level minus revised HGL"
tolerance = 0.02

[outputs.hgl_clearance_margin_mm]
description = "HGL clearance minus minimum required clearance"
tolerance = 0.02

[outputs.ped_clearance_required_s]
description = "Required pedestrian clearance time"
tolerance = 0.02

[outputs.ped_clearance_margin_s]
description = "Available pedestrian clearance minus required clearance"
tolerance = 0.02

[outputs.vms_reading_time_s]
description = "Available VMS reading time"
tolerance = 0.02

[outputs.vms_message_margin_chars]
description = "Readable character capacity minus revised message length"
tolerance = 0.02

[outputs.feeder_voltage_drop_percent]
description = "Voltage drop at revised device load"
tolerance = 0.02

[outputs.voltage_drop_margin_percent]
description = "Allowable voltage drop minus computed voltage drop"
tolerance = 0.02

[outputs.comment_closeout_percent]
description = "Closed comments divided by total comments"
tolerance = 0.02

[outputs.impacted_calculation_count]
description = "Number of discipline calculations impacted by the review change"
tolerance = 0.02

# --- Archetypes ---

[archetypes.urban_arterial_response]
description = "Urban arterial comment-response package with wider crossing and larger ITS load"
site_contexts = ["urban-arterial-comment-response", "cbd-fringe-corridor-review"]
revised_crossing_width_m = {min = 16.0, max = 24.0}
revised_device_load_w = {min = 1900.0, max = 3200.0}
approach_speed_kmh = {min = 45.0, max = 60.0}

[archetypes.suburban_collector_response]
description = "Suburban collector comment-response package with moderate crossing width and shorter feeder"
site_contexts = ["suburban-collector-comment-response", "school-access-corridor-review"]
revised_crossing_width_m = {min = 12.0, max = 19.0}
revised_device_load_w = {min = 1200.0, max = 2400.0}
feeder_length_km = {min = 0.2, max = 0.45}

# --- Difficulty presets ---

[difficulty.easy]
description = "Obvious packet defects: clean, missing revised chainage, or a genuine downstream-repair failure"
visibility = "partial"
archetypes = ["urban_arterial_response", "suburban_collector_response"]
hidden_params = [
  "packet_variant",
  "hgl_clearance_margin_mm",
  "ped_clearance_margin_s",
  "vms_message_margin_chars",
  "voltage_drop_margin_percent",
  "voltage_drop_deficit_percent",
]
packet_variant = ["clean", "missing_revised_chainage", "unsupported_downstream_repair"]

[difficulty.medium]
description = "Full packet-variant distribution"
visibility = "partial"
archetypes = ["urban_arterial_response", "suburban_collector_response"]
hidden_params = [
  "packet_variant",
  "hgl_clearance_margin_mm",
  "ped_clearance_margin_s",
  "vms_message_margin_chars",
  "voltage_drop_margin_percent",
  "voltage_drop_deficit_percent",
]

[difficulty.hard]
description = "Subtle documentary defects: stale register, identity drift, copied scenario, and carried comments"
visibility = "partial"
archetypes = ["urban_arterial_response", "suburban_collector_response"]
hidden_params = [
  "packet_variant",
  "hgl_clearance_margin_mm",
  "ped_clearance_margin_s",
  "vms_message_margin_chars",
  "voltage_drop_margin_percent",
  "voltage_drop_deficit_percent",
]
packet_variant = [
  "stale_change_register_revision",
  "chainage_identity_mismatch",
  "scenario_copy_forward",
  "minor_open_comment_carried",
]
