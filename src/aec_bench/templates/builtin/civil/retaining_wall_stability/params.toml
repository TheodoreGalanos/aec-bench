[meta]
name = "retaining-wall-stability"
description = "Sliding, overturning, and bearing stability checks for gravity retaining walls"
long_description = "Evaluates the external stability of a rectangular gravity retaining wall against three failure modes: sliding along the base, overturning about the toe, and bearing capacity failure of the foundation soil. Active earth pressure is computed using Rankine theory for horizontal backfill, and bearing capacity uses Terzaghi strip footing factors. Outputs include factors of safety, eccentricity, and maximum base pressure per AS 4678 and Eurocode 7."
discipline = "civil"
category = "slope-stability"
standards = ["AS 4678", "Eurocode 7"]
tags = ["civil", "geotechnical", "retaining-wall", "gravity-wall", "sliding", "overturning", "bearing-capacity", "stability"]
tool_mode = "with-tool"

# --- Parameters ---

[params.wall_height_m]
type = "float"
unit = "m"
description = "Total height of the gravity retaining wall H"
min = 2.0
max = 6.0

[params.base_width_m]
type = "float"
unit = "m"
description = "Width of the wall base B (typically 0.5H to 0.7H)"
min = 2.0
max = 4.5

[params.wall_thickness_m]
type = "float"
unit = "m"
description = "Thickness of the wall stem at the top t"
min = 0.4
max = 1.5

[params.concrete_unit_weight_kn_m3]
type = "float"
unit = "kN/m3"
description = "Unit weight of the wall material (concrete or masonry) gamma_c"
min = 22.0
max = 25.0
derivable_from = "archetype"

[params.backfill_friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle of the backfill soil phi'"
min = 20.0
max = 40.0
derivable_from = "archetype"

[params.backfill_unit_weight_kn_m3]
type = "float"
unit = "kN/m3"
description = "Total unit weight of the backfill soil gamma_s"
min = 16.0
max = 21.0
derivable_from = "archetype"

[params.backfill_cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion of the backfill soil c'"
min = 0.0
max = 20.0
optional = true
default = 0.0
derivable_from = "archetype"

[params.surcharge_kpa]
type = "float"
unit = "kPa"
description = "Uniform surcharge pressure on the backfill surface q"
min = 0.0
max = 25.0
optional = true
default = 0.0

[params.foundation_friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle of the foundation soil phi_f"
min = 20.0
max = 42.0
derivable_from = "archetype"

[params.foundation_cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion of the foundation soil c_f"
min = 0.0
max = 50.0
optional = true
default = 0.0
derivable_from = "archetype"

[params.base_friction_ratio]
type = "float"
description = "Ratio of base interface friction to foundation soil friction (typically 2/3)"
min = 0.5
max = 1.0
optional = true
default = 0.67

# --- Outputs ---

[outputs.ka]
description = "Rankine active earth pressure coefficient Ka (dimensionless)"
tolerance = 0.03

[outputs.fos_sliding]
description = "Factor of safety against sliding along the base (dimensionless)"
tolerance = 0.05

[outputs.fos_overturning]
description = "Factor of safety against overturning about the toe (dimensionless)"
tolerance = 0.05

[outputs.fos_bearing]
description = "Factor of safety against bearing capacity failure (dimensionless)"
tolerance = 0.05

[outputs.eccentricity_m]
description = "Eccentricity of the resultant force from the base centre e (m)"
tolerance = 0.05

[outputs.max_base_pressure_kpa]
description = "Maximum base contact pressure under the footing q_max (kPa)"
tolerance = 0.05

# --- Archetypes ---

[archetypes.granular_backfill_sandy_foundation]
description = "Clean granular backfill behind a mass concrete wall on medium dense sand"
concrete_unit_weight_kn_m3 = {min = 23, max = 24}
backfill_friction_angle_deg = {min = 30, max = 35}
backfill_unit_weight_kn_m3 = {min = 17, max = 19}
backfill_cohesion_kpa = {min = 0, max = 0}
foundation_friction_angle_deg = {min = 30, max = 36}
foundation_cohesion_kpa = {min = 0, max = 5}
site_contexts = ["sydney-harbour-seawall", "gold-coast-canal-retaining"]

[archetypes.gravel_backfill_stiff_clay_foundation]
description = "Compacted gravel backfill behind a gravity wall on stiff clay foundation"
concrete_unit_weight_kn_m3 = {min = 23, max = 24}
backfill_friction_angle_deg = {min = 34, max = 40}
backfill_unit_weight_kn_m3 = {min = 19, max = 21}
backfill_cohesion_kpa = {min = 0, max = 0}
foundation_friction_angle_deg = {min = 22, max = 28}
foundation_cohesion_kpa = {min = 20, max = 40}
site_contexts = ["melbourne-basalt-clay-site", "canberra-substation-terrace"]

[archetypes.silty_sand_backfill_weathered_rock]
description = "Silty sand backfill behind a concrete gravity wall on weathered rock"
concrete_unit_weight_kn_m3 = {min = 23, max = 25}
backfill_friction_angle_deg = {min = 26, max = 32}
backfill_unit_weight_kn_m3 = {min = 17, max = 19}
backfill_cohesion_kpa = {min = 2, max = 8}
foundation_friction_angle_deg = {min = 35, max = 42}
foundation_cohesion_kpa = {min = 10, max = 30}
site_contexts = ["brisbane-hillside-retaining", "cairns-port-access-wall"]

[archetypes.cohesive_backfill_sandy_foundation]
description = "Cohesive fill behind a masonry gravity wall on sandy foundation"
concrete_unit_weight_kn_m3 = {min = 22, max = 23}
backfill_friction_angle_deg = {min = 20, max = 28}
backfill_unit_weight_kn_m3 = {min = 17, max = 20}
backfill_cohesion_kpa = {min = 5, max = 15}
foundation_friction_angle_deg = {min = 28, max = 34}
foundation_cohesion_kpa = {min = 0, max = 5}
site_contexts = ["adelaide-hills-road-wall", "perth-coastal-terrace"]

[archetypes.dense_sand_backfill_firm_clay]
description = "Dense sand backfill behind a concrete wall on firm clay"
concrete_unit_weight_kn_m3 = {min = 23, max = 24}
backfill_friction_angle_deg = {min = 32, max = 38}
backfill_unit_weight_kn_m3 = {min = 18, max = 20}
backfill_cohesion_kpa = {min = 0, max = 0}
foundation_friction_angle_deg = {min = 24, max = 30}
foundation_cohesion_kpa = {min = 10, max = 25}
site_contexts = ["darwin-stormwater-channel-wall", "townsville-wharf-retaining"]

# --- Difficulty presets ---

[difficulty.easy]
description = "Cohesionless backfill, no surcharge, all parameters given — simplest three-check variant"
visibility = "all_given"
archetypes = ["granular_backfill_sandy_foundation", "dense_sand_backfill_firm_clay"]
backfill_cohesion_kpa = [0.0]
surcharge_kpa = [0.0]
foundation_cohesion_kpa = [0.0]

[difficulty.medium]
description = "Surcharge and cohesion may be present, all parameters given — full formula set"
visibility = "all_given"
archetypes = ["granular_backfill_sandy_foundation", "gravel_backfill_stiff_clay_foundation", "silty_sand_backfill_weathered_rock", "cohesive_backfill_sandy_foundation", "dense_sand_backfill_firm_clay"]

[difficulty.hard]
description = "Soil properties hidden, agent must infer from site context and soil description"
visibility = "partial"
hidden_params = ["backfill_friction_angle_deg", "backfill_unit_weight_kn_m3", "foundation_friction_angle_deg", "foundation_cohesion_kpa"]
replacement_text = "The backfill is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["gravel_backfill_stiff_clay_foundation", "silty_sand_backfill_weathered_rock", "cohesive_backfill_sandy_foundation"]
