[meta]
name = "sea-level-rise-asset-review-package"
description = "SSC-04 sea-level-rise scenario and asset-level review metrics"
long_description = "Calculates source-bound sea-level-rise asset review metrics from a deterministic SSC-04 task-owned source pack. The template combines future stillwater level, design level, freeboard margin, service threshold exceedance, adaptation raise, cost margin, benefit-cost ratio, scenario trace, and an overall synthetic pass score."
discipline = "civil"
category = "coastal-asset-slr-review"
standards = ["sea-level-rise scenario workflow", "coastal asset review", "adaptation option screening", "service threshold review"]
tags = ["civil", "coastal", "sea-level-rise", "asset-review", "adaptation", "deterministic"]
tool_mode = "with-tool"

[params.present_high_tide_level_m]
type = "float"
unit = "m"
description = "STORM-04-TIDE-06 present high tide level"
min = 1.4
max = 1.4

[params.sea_level_rise_allowance_m]
type = "float"
unit = "m"
description = "SLR-04-SCENARIO-06 sea-level-rise allowance"
min = 0.65
max = 0.65

[params.storm_surge_allowance_m]
type = "float"
unit = "m"
description = "STORM-04-TIDE-06 storm surge allowance"
min = 0.85
max = 0.85

[params.wave_allowance_m]
type = "float"
unit = "m"
description = "SLR-04-SCENARIO-06 wave allowance"
min = 0.35
max = 0.35

[params.asset_elevation_m]
type = "float"
unit = "m"
description = "ASSET-04-REGISTER-06 asset elevation"
min = 3.75
max = 3.75

[params.required_freeboard_m]
type = "float"
unit = "m"
description = "SERVICE-04-CRITERION-06 required freeboard"
min = 0.3
max = 0.3

[params.service_threshold_m]
type = "float"
unit = "m"
description = "SERVICE-04-CRITERION-06 service threshold"
min = 2.7
max = 2.7

[params.adaptation_budget_usd]
type = "float"
unit = "USD"
description = "ADAPT-04-OPTION-06 adaptation budget"
min = 250000.0
max = 250000.0

[params.selected_adaptation_cost_usd]
type = "float"
unit = "USD"
description = "ADAPT-04-OPTION-06 selected adaptation cost"
min = 180000.0
max = 180000.0

[params.avoided_damage_usd]
type = "float"
unit = "USD"
description = "ADAPT-04-OPTION-06 avoided damage"
min = 320000.0
max = 320000.0

[params.traced_scenarios]
type = "float"
description = "MEMO-04-REVIEW-06 traced scenario count"
min = 4.0
max = 4.0

[params.required_scenarios]
type = "float"
description = "MEMO-04-REVIEW-06 required scenario count"
min = 4.0
max = 4.0

[outputs.future_stillwater_level_m]
description = "Future stillwater level"
tolerance = 0.03

[outputs.future_design_level_m]
description = "Future stillwater level plus wave allowance"
tolerance = 0.03

[outputs.asset_freeboard_margin_m]
description = "Asset elevation minus future design level and freeboard"
tolerance = 0.03

[outputs.service_threshold_exceedance_m]
description = "Future stillwater level exceedance over service threshold"
tolerance = 0.03

[outputs.adaptation_raise_required_m]
description = "Asset raising required to meet future design level and freeboard"
tolerance = 0.03

[outputs.adaptation_cost_margin_usd]
description = "Adaptation budget minus selected adaptation cost"
tolerance = 0.03

[outputs.benefit_cost_ratio]
description = "Avoided damage divided by selected adaptation cost"
tolerance = 0.003

[outputs.scenario_trace_score]
description = "Traced scenarios divided by required scenarios"
tolerance = 0.003

[outputs.overall_pass_score]
description = "1.0 when asset review checks pass"
tolerance = 0.001

[archetypes.ssc04_sea_level_rise_case]
description = "Sea-level-rise scenario and asset-level review case"
present_high_tide_level_m = {min = 1.4, max = 1.4}
sea_level_rise_allowance_m = {min = 0.65, max = 0.65}
storm_surge_allowance_m = {min = 0.85, max = 0.85}
wave_allowance_m = {min = 0.35, max = 0.35}
asset_elevation_m = {min = 3.75, max = 3.75}
required_freeboard_m = {min = 0.3, max = 0.3}
service_threshold_m = {min = 2.7, max = 2.7}
adaptation_budget_usd = {min = 250000.0, max = 250000.0}
selected_adaptation_cost_usd = {min = 180000.0, max = 180000.0}
avoided_damage_usd = {min = 320000.0, max = 320000.0}
traced_scenarios = {min = 4.0, max = 4.0}
required_scenarios = {min = 4.0, max = 4.0}

[difficulty.easy]
description = "All source-pack values given for the SSC-04 sea-level-rise asset review package"
visibility = "all_given"
archetypes = ["ssc04_sea_level_rise_case"]

[difficulty.medium]
description = "All source-pack values given for the SSC-04 sea-level-rise asset review package"
visibility = "all_given"
archetypes = ["ssc04_sea_level_rise_case"]

[difficulty.hard]
description = "All source-pack values given for the SSC-04 sea-level-rise asset review package"
visibility = "all_given"
archetypes = ["ssc04_sea_level_rise_case"]
