[meta]
name = "hazen-williams-headloss"
description = "Friction head loss calculation using the Hazen-Williams empirical equation"
long_description = "Calculates friction head loss in pressurised water mains using the Hazen-Williams empirical formula hf = 10.67 * L * Q^1.852 / (C^1.852 * D^4.87), along with the hydraulic gradient and flow velocity. The C-factor encodes pipe material and condition. Widely used in municipal water distribution design per AWWA and AS/NZS 3500 for sizing pipes and evaluating network pressure losses."
discipline = "civil"
category = "pipe-hydraulics"
standards = ["AWWA", "AS/NZS 3500"]
tags = ["civil", "pipe-hydraulics", "head-loss", "hazen-williams", "deterministic"]
tool_mode = "with-tool"

[params.flow_rate_l_s]
type = "float"
unit = "L/s"
description = "Volumetric flow rate Q"
min = 0.5
max = 500.0

[params.pipe_diameter_mm]
type = "float"
unit = "mm"
description = "Internal pipe diameter D"
min = 50
max = 2000

[params.pipe_length_m]
type = "float"
unit = "m"
description = "Pipe length L"
min = 10
max = 5000

[params.c_factor]
type = "float"
description = "Hazen-Williams roughness coefficient C"
min = 60
max = 150
derivable_from = "archetype"

# --- Outputs ---

[outputs.head_loss_m]
description = "Friction head loss hf (m)"
tolerance = 0.03

[outputs.hydraulic_gradient]
description = "Hydraulic gradient S = hf / L (dimensionless)"
tolerance = 0.05

[outputs.flow_velocity_m_s]
description = "Mean flow velocity V (m/s)"
tolerance = 0.03

# --- Archetypes ---
# Pipe material scenarios that determine the Hazen-Williams C-factor.

[archetypes.new_pvc]
description = "New PVC or HDPE pipeline"
c_factor = {min = 140, max = 150}
site_contexts = ["sydney-greenfield", "brisbane-suburban"]

[archetypes.new_ductile_iron]
description = "New cement-lined ductile iron pipeline"
c_factor = {min = 130, max = 140}
site_contexts = ["melbourne-trunk-main", "adelaide-distribution"]

[archetypes.aged_cast_iron]
description = "Aged unlined cast iron pipeline with moderate tuberculation"
c_factor = {min = 80, max = 100}
site_contexts = ["sydney-inner-west-legacy", "melbourne-inner-legacy"]

[archetypes.corroded_steel]
description = "Corroded steel water main"
c_factor = {min = 60, max = 80}
site_contexts = ["darwin-industrial-reticulation", "cairns-coastal-reticulation"]

# --- Difficulty ---

[difficulty.easy]
description = "All parameters given, smooth new pipe, moderate flow"
visibility = "all_given"
archetypes = ["new_pvc", "new_ductile_iron"]

[difficulty.medium]
description = "All parameters given, any pipe material and flow regime"
visibility = "all_given"
archetypes = ["new_pvc", "new_ductile_iron", "aged_cast_iron", "corroded_steel"]

[difficulty.hard]
description = "C-factor hidden, agent must infer from pipe material description"
visibility = "partial"
hidden_params = ["c_factor"]
replacement_text = "The pipe is a {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["new_pvc", "new_ductile_iron", "aged_cast_iron", "corroded_steel"]
