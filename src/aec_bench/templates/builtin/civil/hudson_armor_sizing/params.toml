[meta]
name = "hudson-armor-sizing"
description = "Armor stone sizing using Hudson's equation W = rho_r * H^3 / (KD * (Sr-1)^3 * cot(alpha))"
long_description = "Determines the required median armor stone weight and nominal diameter for breakwater and revetment stability using Hudson's (1959) formula from the USACE Coastal Engineering Manual and CIRIA C683 Rock Manual. Accounts for design wave height, rock and water densities, structure slope, and the stability coefficient KD which depends on armor type and placement method."
discipline = "civil"
category = "armor-stability"
standards = ["USACE CEM", "CIRIA C683 Rock Manual"]
tags = ["coastal", "breakwater", "armor", "riprap", "wave"]
tool_mode = "with-tool"

[params.design_wave_height_m]
type = "float"
unit = "m"
description = "Design wave height H"
min = 0.5
max = 8.0

[params.rock_density_kg_m3]
type = "float"
unit = "kg/m³"
description = "Armor rock density rho_r"
min = 2200
max = 3000
derivable_from = "archetype"

[params.water_density_kg_m3]
type = "float"
unit = "kg/m³"
description = "Water density rho_w"
min = 1000
max = 1035
derivable_from = "archetype"

[params.slope_angle_deg]
type = "float"
unit = "degrees"
description = "Structure slope angle alpha from horizontal"
min = 18
max = 45

[params.stability_coefficient_kd]
type = "float"
unit = "-"
description = "Hudson stability coefficient KD"
min = 1.0
max = 16.0
derivable_from = "archetype"

[outputs.specific_gravity_sr]
description = "Specific gravity of rock Sr = rho_r / rho_w"
tolerance = 0.03

[outputs.armor_weight_tonnes]
description = "Median armor unit weight W (tonnes)"
tolerance = 0.05

[outputs.nominal_diameter_m]
description = "Nominal armor diameter Dn50 (m)"
tolerance = 0.05

# --- Archetypes: armor type / placement scenarios ---

[archetypes.rough_quarrystone_random]
description = "Rough angular quarrystone placed randomly on trunk section"
rock_density_kg_m3 = {min = 2500, max = 2700}
water_density_kg_m3 = {min = 1020, max = 1030}
stability_coefficient_kd = {min = 3.0, max = 4.0}
site_contexts = ["queensland-outer-reef", "nsw-coastal-headland", "wa-exposed-coast"]

[archetypes.rough_quarrystone_special]
description = "Rough angular quarrystone with special placement on trunk"
rock_density_kg_m3 = {min = 2500, max = 2700}
water_density_kg_m3 = {min = 1020, max = 1030}
stability_coefficient_kd = {min = 5.0, max = 6.5}
site_contexts = ["sydney-harbour-breakwater", "melbourne-port-revetment"]

[archetypes.basalt_armor_random]
description = "Dense basalt armor stone placed randomly"
rock_density_kg_m3 = {min = 2800, max = 3000}
water_density_kg_m3 = {min = 1020, max = 1030}
stability_coefficient_kd = {min = 3.5, max = 4.5}
site_contexts = ["victoria-basalt-coast", "north-qld-volcanic"]

[archetypes.freshwater_quarrystone]
description = "Quarrystone armor for freshwater dam or lake revetment"
rock_density_kg_m3 = {min = 2500, max = 2700}
water_density_kg_m3 = {min = 1000, max = 1005}
stability_coefficient_kd = {min = 3.0, max = 4.0}
site_contexts = ["murray-river-weir", "snowy-hydro-dam", "wivenhoe-dam"]

[archetypes.concrete_unit_random]
description = "Concrete armor units (cubes) placed randomly"
rock_density_kg_m3 = {min = 2300, max = 2400}
water_density_kg_m3 = {min = 1020, max = 1030}
stability_coefficient_kd = {min = 6.0, max = 7.5}
site_contexts = ["darwin-harbour-breakwater", "townsville-port-expansion"]

# --- Difficulty levels ---

[difficulty.easy]
description = "Moderate wave height, all parameters given — straightforward Hudson formula"
visibility = "all_given"
archetypes = ["rough_quarrystone_random", "rough_quarrystone_special", "basalt_armor_random", "freshwater_quarrystone", "concrete_unit_random"]

[difficulty.medium]
description = "Larger wave height, steeper slopes — same formula, bigger numbers"
visibility = "all_given"
archetypes = ["rough_quarrystone_random", "rough_quarrystone_special", "basalt_armor_random", "freshwater_quarrystone", "concrete_unit_random"]

[difficulty.hard]
description = "Rock density, water density, and KD hidden — agent must infer from site description"
visibility = "partial"
hidden_params = ["rock_density_kg_m3", "water_density_kg_m3", "stability_coefficient_kd"]
replacement_text = "The armor is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["rough_quarrystone_random", "rough_quarrystone_special", "basalt_armor_random", "freshwater_quarrystone", "concrete_unit_random"]
