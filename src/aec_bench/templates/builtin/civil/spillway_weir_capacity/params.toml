[meta]
name = "spillway-weir-capacity"
description = "Calculate spillway discharge capacity using the standard weir equation with pier/abutment corrections"
long_description = "Calculates spillway discharge capacity using the weir equation Q = C*L_eff*H_e^1.5 with pier and abutment contraction corrections to effective crest length and approach velocity head adjustments per USBR Design Standard No. 14 and USACE EM 1110-2-1603. Supports ogee and broad-crested weir types for dam safety and flood routing assessments."
discipline = "civil"
category = "spillway-hydraulics"
standards = ["USBR Design Standard No. 14", "USACE EM 1110-2-1603"]
tags = ["civil", "hydraulics", "dams", "spillway", "weir", "discharge"]
tool_mode = "with-tool"

[params.crest_length_m]
type = "float"
unit = "m"
description = "Gross crest length of the spillway L"
min = 3.0
max = 120.0

[params.design_head_m]
type = "float"
unit = "m"
description = "Design head over the spillway crest H"
min = 0.3
max = 8.0

[params.discharge_coefficient]
type = "float"
description = "Weir discharge coefficient C (SI metric)"
min = 1.40
max = 2.25
derivable_from = "archetype"

[params.number_of_piers]
type = "int"
description = "Number of piers on the spillway crest N"
min = 0
max = 8
default = 0
optional = true

[params.pier_shape]
type = "enum"
description = "Pier nose geometry for contraction coefficient Kp"
values = ["square", "round", "pointed"]
default = "round"
optional = true
derivable_from = "archetype"

[params.abutment_shape]
type = "enum"
description = "Abutment geometry for contraction coefficient Ka"
values = ["square", "rounded", "streamlined"]
default = "rounded"
optional = true
derivable_from = "archetype"

[params.approach_channel_width_m]
type = "float"
unit = "m"
description = "Width of the approach channel upstream of the spillway B"
min = 5.0
max = 200.0
default = 50.0
optional = true

[params.approach_depth_m]
type = "float"
unit = "m"
description = "Depth of flow in the approach channel h_approach"
min = 0.5
max = 15.0
default = 5.0
optional = true

[outputs.effective_crest_length_m]
description = "Effective crest length after pier and abutment contraction corrections L_eff (m)"
tolerance = 0.03

[outputs.approach_velocity_head_m]
description = "Approach velocity head correction Va²/(2g) (m)"
tolerance = 0.05

[outputs.total_energy_head_m]
description = "Total energy head over crest He = H + Va²/(2g) (m)"
tolerance = 0.03

[outputs.discharge_m3_s]
description = "Total spillway discharge capacity Q (m³/s)"
tolerance = 0.03

[outputs.unit_discharge_m3_s_per_m]
description = "Unit discharge per metre of effective crest q (m³/s/m)"
tolerance = 0.03

# --- Archetypes ---

[archetypes.small_ogee_dam]
description = "Small ogee spillway dam with low head and no piers"
crest_length_m = {min = 5.0, max = 20.0}
design_head_m = {min = 0.5, max = 1.5}
discharge_coefficient = {min = 2.10, max = 2.18}
number_of_piers = {min = 0, max = 0}
approach_channel_width_m = {min = 8.0, max = 30.0}
approach_depth_m = {min = 1.0, max = 3.0}
site_contexts = ["tasmania-small-hydro", "victoria-farm-dam"]

[archetypes.medium_ogee_gated]
description = "Medium ogee spillway with gated bays and piers"
crest_length_m = {min = 20.0, max = 60.0}
design_head_m = {min = 1.5, max = 4.0}
discharge_coefficient = {min = 2.12, max = 2.20}
number_of_piers = {min = 1, max = 4}
approach_channel_width_m = {min = 25.0, max = 80.0}
approach_depth_m = {min = 3.0, max = 8.0}
site_contexts = ["nsw-water-supply-dam", "queensland-irrigation-dam"]

[archetypes.large_ogee_flood]
description = "Large ogee flood spillway with multiple pier bays"
crest_length_m = {min = 50.0, max = 120.0}
design_head_m = {min = 3.0, max = 8.0}
discharge_coefficient = {min = 2.15, max = 2.22}
number_of_piers = {min = 2, max = 8}
approach_channel_width_m = {min = 60.0, max = 200.0}
approach_depth_m = {min = 5.0, max = 15.0}
site_contexts = ["snowy-mountains-flood-dam", "north-queensland-major-dam"]

[archetypes.broad_crested_weir]
description = "Broad-crested weir spillway on low-head dam or diversion structure"
crest_length_m = {min = 5.0, max = 40.0}
design_head_m = {min = 0.3, max = 2.5}
discharge_coefficient = {min = 1.50, max = 1.75}
number_of_piers = {min = 0, max = 2}
approach_channel_width_m = {min = 8.0, max = 60.0}
approach_depth_m = {min = 0.5, max = 5.0}
site_contexts = ["south-australia-diversion-weir", "western-australia-creek-crossing"]

[archetypes.broad_crested_large]
description = "Large broad-crested spillway with piers for multi-bay structure"
crest_length_m = {min = 30.0, max = 80.0}
design_head_m = {min = 1.0, max = 3.5}
discharge_coefficient = {min = 1.55, max = 1.80}
number_of_piers = {min = 1, max = 5}
approach_channel_width_m = {min = 40.0, max = 120.0}
approach_depth_m = {min = 2.0, max = 8.0}
site_contexts = ["northern-territory-barrage", "canberra-lake-overflow"]

# --- Difficulty presets ---

[difficulty.easy]
description = "Simple ogee spillway, no piers, all parameters given"
visibility = "all_given"
archetypes = ["small_ogee_dam"]
number_of_piers = [0]
pier_shape = ["round"]
abutment_shape = ["rounded"]

[difficulty.medium]
description = "All parameters given, includes pier and abutment corrections across both types"
visibility = "all_given"
archetypes = ["medium_ogee_gated", "broad_crested_weir", "broad_crested_large"]

[difficulty.hard]
description = "Discharge coefficient, pier shape, and abutment shape hidden; agent infers from site context"
visibility = "partial"
hidden_params = ["discharge_coefficient", "pier_shape", "abutment_shape"]
replacement_text = "The spillway is a {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["large_ogee_flood", "broad_crested_large"]
