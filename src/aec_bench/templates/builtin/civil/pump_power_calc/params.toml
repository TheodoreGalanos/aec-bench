[meta]
name = "pump-power-calc"
description = "Pump power calculation for water/wastewater pump stations at a given duty point"
long_description = "Calculates hydraulic power (P_h = rho*g*Q*H), brake (shaft) power, and motor input power for a water or wastewater pump station at a specified duty point. Accounts for pump and motor efficiencies to determine the electrical power draw, following AWWA and Hydraulics Institute methodology for pump station design."
discipline = "civil"
category = "pump-station"
standards = ["AWWA", "Hydraulics Institute"]
tags = ["civil", "pump-station", "hydraulic-power", "brake-power", "motor-power", "deterministic"]
tool_mode = "with-tool"

[params.flow_rate_l_s]
type = "float"
unit = "L/s"
description = "Volumetric flow rate Q at the duty point"
min = 1.0
max = 500.0

[params.total_dynamic_head_m]
type = "float"
unit = "m"
description = "Total dynamic head H (static head plus friction losses)"
min = 2.0
max = 120.0

[params.pump_efficiency_pct]
type = "float"
unit = "%"
description = "Pump efficiency at the duty point"
min = 40.0
max = 90.0
derivable_from = "archetype"

[params.motor_efficiency_pct]
type = "float"
unit = "%"
description = "Motor efficiency at the operating load"
min = 80.0
max = 97.0
derivable_from = "archetype"

# --- Outputs ---

[outputs.hydraulic_power_kw]
description = "Hydraulic (water) power P_h (kW)"
tolerance = 0.03

[outputs.brake_power_kw]
description = "Brake (shaft) power P_b (kW)"
tolerance = 0.03

[outputs.motor_input_power_kw]
description = "Motor input (electrical) power P_m (kW)"
tolerance = 0.03

# --- Archetypes ---
# Pump station scenarios representing typical Australian water infrastructure.

[archetypes.small_sewer_lift]
description = "Small sewage lift station with submersible pump"
flow_rate_l_s = {min = 1.0, max = 15.0}
total_dynamic_head_m = {min = 3.0, max = 12.0}
pump_efficiency_pct = {min = 45.0, max = 65.0}
motor_efficiency_pct = {min = 82.0, max = 88.0}
site_contexts = ["brisbane-suburban-sps", "gold-coast-residential-sps"]

[archetypes.medium_water_booster]
description = "Medium water supply booster station with end-suction centrifugal pump"
flow_rate_l_s = {min = 15.0, max = 80.0}
total_dynamic_head_m = {min = 15.0, max = 50.0}
pump_efficiency_pct = {min = 65.0, max = 80.0}
motor_efficiency_pct = {min = 88.0, max = 93.0}
site_contexts = ["sydney-distribution-booster", "melbourne-zone-booster"]

[archetypes.large_trunk_transfer]
description = "Large trunk sewage or water transfer station with split-case pump"
flow_rate_l_s = {min = 80.0, max = 500.0}
total_dynamic_head_m = {min = 20.0, max = 80.0}
pump_efficiency_pct = {min = 75.0, max = 90.0}
motor_efficiency_pct = {min = 92.0, max = 97.0}
site_contexts = ["adelaide-trunk-transfer", "perth-trunk-main"]

[archetypes.high_head_raw_water]
description = "High-head raw water intake pump station with multi-stage pump"
flow_rate_l_s = {min = 20.0, max = 150.0}
total_dynamic_head_m = {min = 60.0, max = 120.0}
pump_efficiency_pct = {min = 70.0, max = 85.0}
motor_efficiency_pct = {min = 90.0, max = 95.0}
site_contexts = ["darwin-raw-water-intake", "cairns-hillside-reservoir"]

# --- Difficulty ---

[difficulty.easy]
description = "All parameters given, small to medium pump station"
visibility = "all_given"
archetypes = ["small_sewer_lift", "medium_water_booster"]

[difficulty.medium]
description = "All parameters given, any pump station type including high head"
visibility = "all_given"
archetypes = ["small_sewer_lift", "medium_water_booster", "large_trunk_transfer", "high_head_raw_water"]

[difficulty.hard]
description = "Efficiencies hidden, agent must infer from pump station type and size"
visibility = "partial"
hidden_params = ["pump_efficiency_pct", "motor_efficiency_pct"]
replacement_text = "The pump station is a {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["small_sewer_lift", "medium_water_booster", "large_trunk_transfer", "high_head_raw_water"]
