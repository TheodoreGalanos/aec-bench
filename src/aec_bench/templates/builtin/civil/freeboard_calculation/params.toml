[meta]
name = "freeboard-calculation"
description = "Freeboard calculation for coastal/flood structures: total freeboard = wave_allowance + slr_allowance + construction_tolerance + safety_margin (NZS 4404 / MfE Guidance)"
long_description = "Determines the total freeboard and minimum crest or floor level for coastal and flood-prone structures by summing component allowances for wave overtopping, sea level rise, construction tolerance, and a consequence-based safety margin, per NZS 4404:2010 and MfE Guidance 2024. Used in coastal and floodplain development to set minimum building levels above the design water surface."
discipline = "civil"
category = "coastal-drainage"
standards = ["NZS 4404:2010", "MfE Guidance 2024"]
tags = ["coastal", "flood", "freeboard", "sea-level-rise", "drainage"]
tool_mode = "both"

[params.design_water_level_m]
type = "float"
unit = "m"
description = "Design still-water level including tidal and storm surge components (m above datum)"
min = 0.5
max = 8.0

[params.wave_allowance_m]
type = "float"
unit = "m"
description = "Wave overtopping allowance depending on wave height and structure type"
min = 0.3
max = 1.0
derivable_from = "archetype"

[params.slr_allowance_m]
type = "float"
unit = "m"
description = "Climate change sea level rise allowance for planning horizon"
min = 0.1
max = 1.0
derivable_from = "archetype"

[params.construction_tolerance_m]
type = "float"
unit = "m"
description = "Construction tolerance allowance"
min = 0.05
max = 0.15
derivable_from = "archetype"

[params.safety_margin_m]
type = "float"
unit = "m"
description = "Safety margin based on consequence category"
min = 0.15
max = 0.50
derivable_from = "archetype"

# --- Outputs ---

[outputs.total_freeboard_m]
description = "Total freeboard allowance (m)"
tolerance = 0.03

[outputs.minimum_crest_level_m]
description = "Minimum crest or floor level (m above datum)"
tolerance = 0.05

# --- Archetypes: structure type / consequence scenarios ---

[archetypes.residential_coastal]
description = "Residential coastal dwelling with low consequence category"
wave_allowance_m = {min = 0.3, max = 0.5}
slr_allowance_m = {min = 0.3, max = 0.6}
construction_tolerance_m = {min = 0.05, max = 0.10}
safety_margin_m = {min = 0.15, max = 0.25}
site_contexts = ["gold-coast-beachfront-house", "auckland-harbour-dwelling", "christchurch-estuary-residence"]

[archetypes.commercial_waterfront]
description = "Commercial waterfront development with medium consequence category"
wave_allowance_m = {min = 0.4, max = 0.7}
slr_allowance_m = {min = 0.4, max = 0.8}
construction_tolerance_m = {min = 0.08, max = 0.12}
safety_margin_m = {min = 0.25, max = 0.35}
site_contexts = ["sydney-darling-harbour-precinct", "wellington-waterfront-retail", "brisbane-river-commercial"]

[archetypes.critical_infrastructure]
description = "Critical infrastructure with high consequence category (hospital, power station)"
wave_allowance_m = {min = 0.6, max = 1.0}
slr_allowance_m = {min = 0.6, max = 1.0}
construction_tolerance_m = {min = 0.10, max = 0.15}
safety_margin_m = {min = 0.35, max = 0.50}
site_contexts = ["tauranga-port-substation", "darwin-hospital-coastal", "townsville-water-treatment-plant"]

[archetypes.seawall_revetment]
description = "Seawall or revetment structure protecting coastal assets"
wave_allowance_m = {min = 0.5, max = 0.8}
slr_allowance_m = {min = 0.4, max = 0.9}
construction_tolerance_m = {min = 0.08, max = 0.12}
safety_margin_m = {min = 0.20, max = 0.40}
site_contexts = ["napier-marine-parade-seawall", "cairns-esplanade-revetment", "perth-scarborough-seawall"]

# --- Difficulty levels ---

[difficulty.easy]
description = "Low consequence structure, all parameters given — straightforward addition"
visibility = "all_given"
archetypes = ["residential_coastal", "commercial_waterfront", "seawall_revetment"]

[difficulty.medium]
description = "Higher consequence, larger allowances — all parameters given, same formula"
visibility = "all_given"
archetypes = ["commercial_waterfront", "critical_infrastructure", "seawall_revetment"]

[difficulty.hard]
description = "Wave allowance, SLR allowance, construction tolerance, and safety margin hidden — agent must infer from structure type and consequence category"
visibility = "partial"
hidden_params = ["wave_allowance_m", "slr_allowance_m", "construction_tolerance_m", "safety_margin_m"]
replacement_text = "The structure is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["residential_coastal", "commercial_waterfront", "critical_infrastructure", "seawall_revetment"]
