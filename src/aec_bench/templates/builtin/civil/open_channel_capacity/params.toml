[meta]
name = "open-channel-capacity"
description = "Flow capacity and velocity in trapezoidal/rectangular open channels using Manning's equation"
long_description = "Computes flow area, wetted perimeter, hydraulic radius, velocity, discharge capacity, and Froude number for trapezoidal or rectangular open channels using Manning's equation V = (1/n)*R^(2/3)*S^(1/2). Used in drainage and flood conveyance design per HEC-22 and Australian Rainfall and Runoff (ARR) standards."
discipline = "civil"
category = "hydraulic-calculations"
standards = ["HEC-22", "ARR"]
tags = ["civil", "hydraulics", "drainage", "open-channel", "mannings", "deterministic"]
tool_mode = "with-tool"

# --- Parameters ---

[params.bottom_width_m]
type = "float"
unit = "m"
description = "Channel bottom width b"
min = 0.3
max = 10.0

[params.flow_depth_m]
type = "float"
unit = "m"
description = "Flow depth y"
min = 0.1
max = 5.0

[params.side_slope_z]
type = "float"
unit = "-"
description = "Side slope ratio z (horizontal:vertical, 0 for rectangular)"
min = 0.0
max = 4.0

[params.mannings_n]
type = "float"
description = "Manning's roughness coefficient n"
min = 0.010
max = 0.060
derivable_from = "archetype"

[params.channel_slope_m_per_m]
type = "float"
unit = "m/m"
description = "Longitudinal channel slope S"
min = 0.0005
max = 0.10

# --- Outputs ---

[outputs.flow_area_m2]
description = "Flow cross-sectional area A (m²)"
tolerance = 0.03

[outputs.wetted_perimeter_m]
description = "Wetted perimeter P (m)"
tolerance = 0.03

[outputs.hydraulic_radius_m]
description = "Hydraulic radius R (m)"
tolerance = 0.03

[outputs.flow_velocity_m_s]
description = "Flow velocity V (m/s)"
tolerance = 0.03

[outputs.flow_capacity_m3_s]
description = "Flow capacity Q (m³/s)"
tolerance = 0.03

[outputs.froude_number]
description = "Froude number Fr (dimensionless)"
tolerance = 0.05

# --- Archetypes: channel lining / surface types ---

[archetypes.concrete_lined]
description = "Concrete-lined trapezoidal channel"
mannings_n = {min = 0.012, max = 0.018}
site_contexts = ["brisbane-trunk-drainage", "sydney-stormwater-channel"]

[archetypes.grassed_channel]
description = "Grassed or turfed drainage swale"
mannings_n = {min = 0.025, max = 0.045}
site_contexts = ["melbourne-suburban-swale", "perth-bioretention-swale"]

[archetypes.riprap_lined]
description = "Riprap or rock-lined channel"
mannings_n = {min = 0.030, max = 0.050}
site_contexts = ["darwin-creek-stabilisation", "cairns-erosion-control"]

[archetypes.natural_earth]
description = "Unlined natural earth channel"
mannings_n = {min = 0.020, max = 0.035}
site_contexts = ["adelaide-rural-drain", "hobart-farm-channel"]

[archetypes.gabion_lined]
description = "Gabion-lined channel"
mannings_n = {min = 0.025, max = 0.040}
site_contexts = ["gold-coast-creek-works", "townsville-flood-channel"]

# --- Difficulty levels ---

[difficulty.easy]
description = "Rectangular channel (z = 0), all parameters given"
visibility = "all_given"
archetypes = ["concrete_lined", "natural_earth"]
side_slope_z = [0.0]

[difficulty.medium]
description = "Trapezoidal channel, all parameters given"
visibility = "all_given"
archetypes = ["concrete_lined", "grassed_channel", "riprap_lined", "natural_earth", "gabion_lined"]

[difficulty.hard]
description = "Trapezoidal channel, roughness coefficient hidden"
visibility = "partial"
hidden_params = ["mannings_n"]
replacement_text = "The channel is {{ archetype.description }} at {{ archetype.site_context }}"
archetypes = ["concrete_lined", "grassed_channel", "riprap_lined", "natural_earth", "gabion_lined"]
