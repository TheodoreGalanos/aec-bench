[meta]
name = "lateral-earth-pressure"
description = "Rankine lateral earth pressure with water table effects for retaining wall design"
long_description = "Calculates active and passive earth pressure coefficients and resultant forces on retaining walls using Rankine theory per AS 4678. Handles two-zone pressure distribution when a water table is present, computing effective earth pressure above and below the water table plus hydrostatic thrust. Outputs include Ka, Kp, active and passive forces, overturning moment, and water force per unit wall length for stability assessment."
discipline = "civil"
category = "slope-stability"
standards = ["AS 4678", "Rankine (1857)"]
tags = ["civil", "geotechnical", "earth-pressure", "retaining-wall", "water-table", "rankine"]
tool_mode = "with-tool"

[params.wall_height_m]
type = "float"
unit = "m"
description = "Retaining wall height H"
min = 1.0
max = 12.0

[params.friction_angle_deg]
type = "float"
unit = "degrees"
description = "Effective friction angle of backfill soil phi'"
min = 15.0
max = 45.0
derivable_from = "archetype"

[params.cohesion_kpa]
type = "float"
unit = "kPa"
description = "Effective cohesion of backfill soil c'"
min = 0.0
max = 50.0
optional = true
default = 0.0
derivable_from = "archetype"

[params.unit_weight_kn_m3]
type = "float"
unit = "kN/m3"
description = "Total (bulk) unit weight of backfill soil gamma"
min = 15.0
max = 22.0
derivable_from = "archetype"

[params.surcharge_kpa]
type = "float"
unit = "kPa"
description = "Uniform surcharge pressure on the backfill surface q"
min = 0.0
max = 30.0
optional = true
default = 0.0

[params.water_table_depth_m]
type = "float"
unit = "m"
description = "Depth from ground surface to the water table behind the wall (equal to wall height means no water)"
min = 0.0
max = 12.0

[params.backfill_slope_deg]
type = "float"
unit = "degrees"
description = "Backfill slope angle beta above horizontal"
min = 0.0
max = 25.0
optional = true
default = 0.0

[outputs.ka]
description = "Active earth pressure coefficient Ka (dimensionless)"
tolerance = 0.03

[outputs.kp]
description = "Passive earth pressure coefficient Kp (dimensionless)"
tolerance = 0.03

[outputs.active_force_kn_per_m]
description = "Total active earth pressure force per unit wall length Pa (kN/m)"
tolerance = 0.03

[outputs.passive_force_kn_per_m]
description = "Total passive earth pressure force per unit wall length Pp (kN/m)"
tolerance = 0.03

[outputs.active_moment_knm_per_m]
description = "Active overturning moment about the wall base Ma (kNm/m)"
tolerance = 0.03

[outputs.water_force_kn_per_m]
description = "Hydrostatic water force per unit wall length Pw (kN/m)"
tolerance = 0.03

# --- Archetypes ---

[archetypes.loose_sand_dry]
description = "Loose sand backfill, no water table"
friction_angle_deg = {min = 28, max = 32}
cohesion_kpa = {min = 0, max = 0}
unit_weight_kn_m3 = {min = 16, max = 18}
water_table_depth_m = {min = 12, max = 12}
site_contexts = ["perth-coastal-retaining-wall", "gold-coast-canal-wall"]

[archetypes.medium_dense_sand_dry]
description = "Medium dense sand backfill, no water table"
friction_angle_deg = {min = 32, max = 36}
cohesion_kpa = {min = 0, max = 0}
unit_weight_kn_m3 = {min = 18, max = 20}
water_table_depth_m = {min = 12, max = 12}
site_contexts = ["sydney-harbour-foreshore-wall", "brisbane-river-terrace"]

[archetypes.dense_gravel_fill]
description = "Dense gravel fill behind a cantilever wall"
friction_angle_deg = {min = 36, max = 42}
cohesion_kpa = {min = 0, max = 0}
unit_weight_kn_m3 = {min = 19, max = 21}
water_table_depth_m = {min = 12, max = 12}
site_contexts = ["adelaide-quarry-haul-road", "cairns-port-wharf-wall"]

[archetypes.silty_sand_with_water]
description = "Silty sand backfill with elevated water table"
friction_angle_deg = {min = 28, max = 34}
cohesion_kpa = {min = 0, max = 5}
unit_weight_kn_m3 = {min = 18, max = 20}
water_table_depth_m = {min = 1.0, max = 4.0}
site_contexts = ["darwin-stormwater-channel-wall", "townsville-coastal-revetment"]

[archetypes.stiff_clay_fill]
description = "Stiff clay backfill behind a gravity wall"
friction_angle_deg = {min = 20, max = 28}
cohesion_kpa = {min = 10, max = 40}
unit_weight_kn_m3 = {min = 18, max = 21}
water_table_depth_m = {min = 12, max = 12}
site_contexts = ["melbourne-basalt-clay-wall", "canberra-substation-retaining"]

# --- Difficulty levels ---

[difficulty.easy]
description = "Cohesionless sand, no water table, no surcharge, horizontal backfill"
visibility = "all_given"
archetypes = ["loose_sand_dry", "medium_dense_sand_dry"]
cohesion_kpa = [0.0]
surcharge_kpa = [0.0]
backfill_slope_deg = [0.0]

[difficulty.medium]
description = "Surcharge and cohesion may be present, horizontal or sloping backfill, no water"
visibility = "all_given"
archetypes = ["medium_dense_sand_dry", "dense_gravel_fill", "stiff_clay_fill"]

[difficulty.hard]
description = "Water table present, some soil parameters hidden; agent infers from site context"
visibility = "partial"
hidden_params = ["friction_angle_deg", "unit_weight_kn_m3"]
replacement_text = "The retained soil is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["silty_sand_with_water", "stiff_clay_fill"]
