[meta]
name = "weir-outlet-design"
description = "Size emergency spillway weir for detention basin overflow"
long_description = "Sizes a sharp-crested rectangular weir for detention basin emergency overflow using the Francis formula Q = Cw * (L - 0.1*n*H) * H^1.5, where Cw = Cd * sqrt(2g). Solves for the required crest length given design flow, head, discharge coefficient, and end contractions, supporting stormwater detention and flood control design."
discipline = "civil"
category = "detention-design"
standards = ["Hydraulics textbooks", "Francis formula (1883)"]
tags = ["civil", "hydraulics", "stormwater", "detention", "weir", "spillway"]
tool_mode = "with-tool"

[params.design_flow_m3_s]
type = "float"
unit = "m³/s"
description = "Design overflow discharge Q"
min = 0.01
max = 10.0

[params.head_over_weir_m]
type = "float"
unit = "m"
description = "Head of water over the weir crest H"
min = 0.05
max = 1.5
derivable_from = "archetype"

[params.discharge_coefficient]
type = "float"
description = "Weir discharge coefficient Cd"
min = 0.55
max = 0.70
default = 0.62
optional = true
derivable_from = "archetype"

[params.number_of_contractions]
type = "int"
description = "Number of end contractions n (0 = suppressed, 1 or 2 = contracted)"
min = 0
max = 2
default = 0
optional = true
derivable_from = "archetype"

[outputs.required_weir_length_m]
description = "Required weir crest length L (m)"
tolerance = 0.03

[outputs.unit_discharge_m3_s_per_m]
description = "Unit discharge per metre of weir crest q (m³/s/m)"
tolerance = 0.03

[archetypes.small_urban_basin]
description = "Small urban detention basin with low-level spillway weir"
head_over_weir_m = {min = 0.05, max = 0.3}
discharge_coefficient = {min = 0.60, max = 0.64}
number_of_contractions = {min = 0, max = 0}
site_contexts = ["sydney-infill-residential", "melbourne-suburban-subdivision"]

[archetypes.medium_commercial_basin]
description = "Medium commercial development detention basin spillway"
head_over_weir_m = {min = 0.2, max = 0.6}
discharge_coefficient = {min = 0.58, max = 0.63}
number_of_contractions = {min = 0, max = 2}
site_contexts = ["brisbane-commercial-park", "adelaide-retail-precinct"]

[archetypes.large_regional_basin]
description = "Large regional stormwater detention facility with emergency spillway"
head_over_weir_m = {min = 0.4, max = 1.2}
discharge_coefficient = {min = 0.60, max = 0.65}
number_of_contractions = {min = 0, max = 0}
site_contexts = ["perth-regional-wetland", "gold-coast-flood-control"]

[archetypes.channel_diversion_weir]
description = "Channel diversion weir with end contractions"
head_over_weir_m = {min = 0.1, max = 0.5}
discharge_coefficient = {min = 0.58, max = 0.62}
number_of_contractions = {min = 1, max = 2}
site_contexts = ["canberra-drainage-diversion", "townsville-channel-control"]

[difficulty.easy]
description = "All parameters given, suppressed weir with standard coefficient"
visibility = "all_given"
archetypes = ["small_urban_basin", "medium_commercial_basin"]
number_of_contractions = [0]
discharge_coefficient = [0.62]

[difficulty.medium]
description = "All parameters given, variable coefficient and end contractions"
visibility = "all_given"
archetypes = ["small_urban_basin", "medium_commercial_basin", "large_regional_basin", "channel_diversion_weir"]

[difficulty.hard]
description = "Discharge coefficient and head hidden, agent must infer from site context"
visibility = "partial"
hidden_params = ["discharge_coefficient", "head_over_weir_m"]
replacement_text = "The detention basin has a {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["small_urban_basin", "medium_commercial_basin", "large_regional_basin", "channel_diversion_weir"]
