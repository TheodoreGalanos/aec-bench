[meta]
name = "tidal-prism"
description = "Tidal prism and mean inlet velocity for a coastal basin"
long_description = "Calculates the tidal prism exchanged by an estuary, lagoon, or basin using the reduced relation P = basin surface area x tidal range. It also estimates mean exchange flow and mean inlet velocity from the inlet flow area and exchange duration, giving a deterministic coastal hydraulics screening calculation."
discipline = "civil"
category = "tidal-water-levels"
standards = ["USACE Coastal Engineering Manual"]
tags = ["civil", "coastal", "tidal-prism", "inlet", "hydraulics", "deterministic"]
tool_mode = "with-tool"

[params.basin_surface_area_m2]
type = "float"
unit = "m2"
description = "Water surface area of the tidal basin"
min = 10000
max = 50000000

[params.tidal_range_m]
type = "float"
unit = "m"
description = "Representative tidal range over the exchange cycle"
min = 0.1
max = 8.0

[params.inlet_width_m]
type = "float"
unit = "m"
description = "Hydraulic width of the inlet throat"
min = 5
max = 1000

[params.inlet_average_depth_m]
type = "float"
unit = "m"
description = "Average flow depth through the inlet throat"
min = 0.5
max = 30

[params.exchange_duration_h]
type = "float"
unit = "h"
description = "Duration of the flood or ebb exchange"
min = 1
max = 12.5

[outputs.tidal_prism_m3]
description = "Tidal prism volume exchanged over the tide"
tolerance = 0.03

[outputs.inlet_flow_area_m2]
description = "Approximate inlet flow area"
tolerance = 0.03

[outputs.mean_tidal_flow_m3_s]
description = "Mean tidal exchange flow rate"
tolerance = 0.03

[outputs.mean_tidal_velocity_m_s]
description = "Mean velocity through the inlet throat"
tolerance = 0.03

[archetypes.small_lagoon]
description = "Small lagoon entrance with modest tidal range"
basin_surface_area_m2 = {min = 10000, max = 250000}
tidal_range_m = {min = 0.3, max = 1.5}
inlet_width_m = {min = 5, max = 40}
inlet_average_depth_m = {min = 0.5, max = 3.0}
site_contexts = ["coastal-lagoon", "tidal-creek"]

[archetypes.estuary_inlet]
description = "Medium estuary with a trained or natural inlet"
basin_surface_area_m2 = {min = 250000, max = 5000000}
tidal_range_m = {min = 0.8, max = 3.0}
inlet_width_m = {min = 30, max = 250}
inlet_average_depth_m = {min = 2.0, max = 12.0}
site_contexts = ["east-coast-estuary", "urban-river-mouth"]

[archetypes.large_embayment]
description = "Large embayment or harbour with broad exchange area"
basin_surface_area_m2 = {min = 5000000, max = 50000000}
tidal_range_m = {min = 1.0, max = 8.0}
inlet_width_m = {min = 150, max = 1000}
inlet_average_depth_m = {min = 6.0, max = 30.0}
site_contexts = ["harbour-entrance", "large-estuary"]

[difficulty.easy]
description = "All tidal prism inputs given for a small basin"
visibility = "all_given"
archetypes = ["small_lagoon"]
exchange_duration_h = [6.2]

[difficulty.medium]
description = "Mixed estuary sizes and exchange durations"
visibility = "all_given"
archetypes = ["small_lagoon", "estuary_inlet"]

[difficulty.hard]
description = "Large basin context with exchange duration hidden"
visibility = "partial"
hidden_params = ["exchange_duration_h"]
replacement_text = "Use a representative semi-diurnal flood or ebb exchange duration for {{ archetype.description }}."
archetypes = ["estuary_inlet", "large_embayment"]
exchange_duration_h = [6.2]
