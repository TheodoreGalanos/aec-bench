[meta]
name = "wave-runup"
description = "2% exceedance wave runup on coastal structures using EurOtop (2018) TAW formula"
long_description = "Calculates the 2% exceedance wave runup height Ru2% on sloped coastal structures using the EurOtop (2018) TAW formula, which evaluates both breaking and surging runup expressions and takes the governing (minimum) value. Accounts for structure slope, surface roughness, and berm geometry to determine freeboard requirements for dikes, seawalls, and breakwaters."
discipline = "civil"
category = "wave-overtopping"
standards = ["EurOtop (2018)", "TAW Guidelines"]
tags = ["coastal", "wave", "runup", "overtopping", "breakwater", "dike"]
tool_mode = "both"

[params.wave_height_m]
type = "float"
unit = "m"
description = "Significant spectral wave height H_m0"
min = 0.3
max = 6.0

[params.wave_period_s]
type = "float"
unit = "s"
description = "Spectral wave period T_m-1,0"
min = 3.0
max = 16.0
derivable_from = "archetype"

[params.structure_slope]
type = "float"
unit = "-"
description = "Structure slope tan(alpha), e.g. 0.33 for 1:3 slope"
min = 0.10
max = 0.75

[params.roughness_factor]
type = "float"
unit = "-"
description = "Roughness reduction factor gamma_f (1.0 = smooth, lower = rougher)"
min = 0.35
max = 1.0
derivable_from = "archetype"

[params.berm_factor]
type = "float"
unit = "-"
description = "Berm reduction factor gamma_b (1.0 = no berm, lower = larger berm)"
min = 0.6
max = 1.0
derivable_from = "archetype"

# --- Outputs ---

[outputs.breaker_parameter]
description = "Breaker parameter (Iribarren number) xi_m-1,0"
tolerance = 0.05

[outputs.runup_height_m]
description = "2% exceedance wave runup height Ru2% (m)"
tolerance = 0.05

[outputs.regime]
description = "Wave regime: 1.0 = breaking/plunging, 2.0 = surging/non-breaking"
tolerance = 0.01

# --- Archetypes: coastal structure scenarios ---

[archetypes.smooth_dike]
description = "Smooth concrete or asphalt dike with gentle seaward slope"
roughness_factor = {min = 0.95, max = 1.0}
berm_factor = {min = 0.90, max = 1.0}
wave_period_s = {min = 5.0, max = 12.0}
site_contexts = ["dutch-north-sea-dike", "thames-estuary-embankment", "brisbane-river-levee"]

[archetypes.rock_armour_revetment]
description = "Double-layer rock armour revetment on steep slope"
roughness_factor = {min = 0.50, max = 0.60}
berm_factor = {min = 0.85, max = 1.0}
wave_period_s = {min = 6.0, max = 14.0}
site_contexts = ["gold-coast-revetment", "newcastle-foreshore-armour", "darwin-seawall"]

[archetypes.concrete_seawall]
description = "Stepped or smooth concrete seawall with moderate roughness"
roughness_factor = {min = 0.85, max = 0.95}
berm_factor = {min = 0.80, max = 1.0}
wave_period_s = {min = 4.0, max = 10.0}
site_contexts = ["sydney-harbour-seawall", "adelaide-glenelg-wall", "cairns-esplanade-wall"]

[archetypes.rubble_mound_breakwater]
description = "Rubble mound breakwater with rough two-layer armor"
roughness_factor = {min = 0.38, max = 0.45}
berm_factor = {min = 0.60, max = 0.80}
wave_period_s = {min = 8.0, max = 16.0}
site_contexts = ["fremantle-outer-breakwater", "townsville-port-breakwater", "portland-harbour-arm"]

# --- Difficulty levels ---

[difficulty.easy]
description = "Moderate waves on smooth structure — all parameters given, straightforward calculation"
visibility = "all_given"
archetypes = ["smooth_dike", "concrete_seawall"]

[difficulty.medium]
description = "Larger waves on rough structures — all parameters given, more complex conditions"
visibility = "all_given"
archetypes = ["smooth_dike", "rock_armour_revetment", "concrete_seawall", "rubble_mound_breakwater"]

[difficulty.hard]
description = "Roughness and berm factors hidden — agent must infer from site description"
visibility = "partial"
hidden_params = ["roughness_factor", "berm_factor", "wave_period_s"]
replacement_text = "The structure is {{ archetype.description }} ({{ archetype.site_context }})"
archetypes = ["smooth_dike", "rock_armour_revetment", "concrete_seawall", "rubble_mound_breakwater"]
