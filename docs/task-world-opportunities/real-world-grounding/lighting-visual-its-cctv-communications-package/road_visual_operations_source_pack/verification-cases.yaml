# ABOUTME: Positive and negative verifier cases for the SSC-13 road visual operations seed.
# ABOUTME: Keeps future verifier expectations concrete without adding runtime code.

source_pack_id: road_visual_operations_source_pack_seed_001
status: docs_only_verifier_case_skeleton
policy: These cases are research fixtures for future verifier implementation. They are not executable runtime tests yet.

baseline_case:
  id: baseline_road_visual_operations_pass
  expected_result: pass
  description: The unmodified seed pack should pass source, lighting, CCTV, VMS policy, network, power, handoff, memo, and non-claim checks.
  required_gates:
    - manifest_completeness
    - source_status_boundary
    - object_identity
    - lighting_grid_formula
    - lighting_thresholds
    - camera_ppm_formula
    - camera_storage_formula
    - message_policy_trace
    - traffic_control_non_claim
    - bandwidth_formula
    - poe_formula
    - fibre_loss_formula
    - backup_energy_formula
    - memo_traceability
    - no_silent_handoff_mutation
    - readiness_non_claim

negative_cases:
  - id: missing_manifest_file
    expected_result: fail
    failure_stage: source_intake
    mutation: Remove `device-schedule.csv` from the pack while leaving it listed in project.json.
    expected_diagnostic: missing_or_unparseable_source_pack_file
  - id: moved_camera_without_scene_update
    expected_result: fail
    failure_stage: source_intake
    mutation: Change CCTV-02 object_id in device-schedule.csv to CCTV-99 without adding a matching scene-layout.csv object.
    expected_diagnostic: object_identity_mismatch
  - id: lighting_average_underreported
    expected_result: fail
    failure_stage: lighting_summary
    mutation: Report LIGHT-AVG as 17.875 lux instead of 18.875 lux.
    expected_diagnostic: lighting_summary_mismatch
  - id: lighting_grid_changed_without_oracle_update
    expected_result: fail
    failure_stage: lighting_summary
    mutation: Change LG-05 illuminance_lux from 16.8 to 12.0 without updating LIGHT-MIN and LIGHT-U0.
    expected_diagnostic: lighting_summary_mismatch
  - id: camera_target_width_wrong
    expected_result: fail
    failure_stage: cctv_coverage
    mutation: Change CCTV-02 target_width_m from 32.0 to 36.0 while leaving actual_ppm as 60.0.
    expected_diagnostic: camera_ppm_mismatch
  - id: storage_without_overhead
    expected_result: fail
    failure_stage: cctv_coverage
    mutation: Report total CCTV storage as 1.81440 TB, omitting the 1.10 overhead.
    expected_diagnostic: camera_storage_mismatch
  - id: extra_vms_phase_invented
    expected_result: fail
    failure_stage: vms_policy
    mutation: Solver output adds a third message phase not present in MSG-POL-01.
    expected_diagnostic: message_policy_trace_missing
  - id: unsupported_mutcd_approval_claim
    expected_result: fail
    failure_stage: vms_policy
    mutation: Solver output claims the synthetic VMS message policy proves full MUTCD compliance and authority approval.
    expected_diagnostic: unsupported_traffic_control_claim
  - id: bandwidth_load_omits_vms
    expected_result: fail
    failure_stage: network_power
    mutation: Report NET-BW as 12.700 Mbps by omitting VMS-01.
    expected_diagnostic: bandwidth_handoff_mismatch
  - id: poe_budget_includes_non_poe_lighting
    expected_result: fail
    failure_stage: network_power
    mutation: Include all four luminaires in the PoE load and report POE-LOAD as 364 W.
    expected_diagnostic: poe_handoff_mismatch
  - id: fibre_reserve_omitted
    expected_result: fail
    failure_stage: network_power
    mutation: Report FIB-LOSS as 1.347 dB, omitting the 1.0 dB design reserve.
    expected_diagnostic: fibre_loss_mismatch
  - id: ups_efficiency_omitted
    expected_result: fail
    failure_stage: network_power
    mutation: Report UPS-ENERGY as 1.080 kWh, omitting the 0.85 efficiency divisor.
    expected_diagnostic: backup_energy_mismatch
  - id: memo_changes_storage_value
    expected_result: fail
    failure_stage: visual_operations_memo
    mutation: Solver output reports CCTV storage as 1.50 TB in the memo while source tables show 1.99584 TB.
    expected_diagnostic: silent_handoff_mutation
  - id: benchmark_ready_overclaim
    expected_result: fail
    failure_stage: visual_operations_memo
    mutation: Solver output claims the docs-only synthetic seed is an executable benchmark-ready task.
    expected_diagnostic: readiness_overclaim
