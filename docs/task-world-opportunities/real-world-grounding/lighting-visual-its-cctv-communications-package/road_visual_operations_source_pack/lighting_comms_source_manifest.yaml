# ABOUTME: Shared source manifest for the SSC-13 road visual operations synthetic pack.
# ABOUTME: Defines the scene, criteria, devices, topology, power, and authority partitions.

source_pack:
  id: road_visual_operations_source_pack_seed_001
  cluster_id: SSC-13
  product_id: SSC-13-LH-01
  status: docs_only_runnable_synthetic_seed
  selected_product: Road Visual Operations, ITS, CCTV, Lighting, And Comms Power Package
  last_checked_date: "2026-07-01"
  redistribution_boundary: The fixture values are task-owned synthetic data; external workflow pages are referenced for field shape only.

scene_geometry:
  road_segment_id: RD-SSC13-001
  segment_length_m: 120.0
  carriageway_width_m: 7.0
  chainage_start_m: 0.0
  chainage_end_m: 120.0
  cabinet_id: CAB-01
  vms_id: VMS-01
  controlling_layout_file: scene-layout.csv

visual_targets:
  lighting_case_id: LT-NIGHT-INCIDENT
  target_average_lux_min: 15.0
  target_min_lux_min: 10.0
  target_min_to_average_uniformity_min: 0.40
  cctv_ppm_min: 60.0
  vms_min_viewing_distance_m: 120.0
  source_status: task_owned_synthetic_criteria

device_register:
  luminaires: [L-01, L-02, L-03, L-04]
  cameras: [CCTV-01, CCTV-02]
  message_signs: [VMS-01]
  cabinets: [CAB-01]
  switches: [SW-01]
  fibre_links: [FIB-01]
  controlling_schedule_file: device-schedule.csv

content_policy:
  message_policy_id: MSG-POL-01
  allowed_messages:
    - INCIDENT AHEAD
    - USE LEFT LANE
  max_message_phases: 2
  max_characters_per_phase: 18
  source_status: task_owned_synthetic_policy

network_topology:
  topology_id: NET-SSC13-001
  uplink_id: FIB-01
  switch_id: SW-01
  uplink_capacity_mbps: 100.0
  max_design_utilization: 0.70
  fibre_budget_available_db: 15.0
  controlling_oracle_file: network-power-oracle.csv

power_profile:
  cabinet_id: CAB-01
  normal_lighting_load_w: 320.0
  vms_load_w: 180.0
  cabinet_aux_load_w: 40.0
  poe_budget_w: 120.0
  ups_autonomy_h: 2.0
  ups_efficiency: 0.85
  controlling_oracle_file: network-power-oracle.csv

operating_scenario:
  scenario_id: NIGHT-INCIDENT-01
  description: Night road incident mode with VMS active, both cameras recording continuously, and all four luminaires energized.
  retention_days: 14
  recording_schedule: continuous_24h

authority_partition:
  lighting_reference: AGi32 and DIALux workflow shape only; task-owned criteria grade the baseline.
  traffic_control_reference: FHWA MUTCD current official PDF route only; task-owned message policy grades the baseline.
  cctv_reference: Axis and JVSG workflow shape only; task-owned PPM/storage rows grade the baseline.
  its_reference: ARC-IT and NTCIP source routes only; task-owned topology rows grade the baseline.
  fixture_policy: Do not claim authority approval, software-certified output, full standards compliance, or benchmark readiness.
