# ABOUTME: Handoff ledger for the SSC-13 road visual operations synthetic pack.
# ABOUTME: Names intermediate values that downstream checks and the memo must preserve.

handoffs:
  - id: H_SCENE_ID
    producer_stage: source_intake
    value: RD-SSC13-001
    unit: id
    source_file: scene-layout.csv
    consumers: [lighting_summary, cctv_coverage, vms_policy, network_power, visual_operations_memo]
  - id: H_LIGHT_AVG_LUX
    producer_stage: lighting_summary
    value: 18.875
    unit: lux
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_LIGHT_MIN_LUX
    producer_stage: lighting_summary
    value: 16.800
    unit: lux
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_LIGHT_U0
    producer_stage: lighting_summary
    value: 0.890
    unit: ratio
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_CCTV_MIN_PPM
    producer_stage: cctv_coverage
    value: 60.0
    unit: ppm
    source_file: camera-coverage-oracle.csv
    consumers: [network_power, visual_operations_memo]
  - id: H_CCTV_STORAGE_TB
    producer_stage: cctv_coverage
    value: 1.99584
    unit: TB
    source_file: network-power-oracle.csv
    consumers: [network_power, visual_operations_memo]
  - id: H_VMS_POLICY_ID
    producer_stage: vms_policy
    value: MSG-POL-01
    unit: id
    source_file: lighting_comms_source_manifest.yaml
    consumers: [visual_operations_memo]
  - id: H_NETWORK_LOAD_MBPS
    producer_stage: network_power
    value: 16.700
    unit: Mbps
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_POE_LOAD_W
    producer_stage: network_power
    value: 44.000
    unit: W
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_FIBRE_LOSS_DB
    producer_stage: network_power
    value: 2.347
    unit: dB
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
  - id: H_UPS_ENERGY_KWH
    producer_stage: network_power
    value: 1.271
    unit: kWh
    source_file: network-power-oracle.csv
    consumers: [visual_operations_memo]
