# ABOUTME: Verification rules for the SSC-13 road visual operations synthetic pack.
# ABOUTME: Provides deterministic future verifier checks without adding runtime code.

source_pack_id: road_visual_operations_source_pack_seed_001
status: docs_only_verifier_rule_plan
policy: These rules are research fixtures for future verifier implementation. They are not executable runtime tests yet.

tolerances:
  illuminance_lux: 0.001
  ratio: 0.001
  bandwidth_mbps: 0.001
  power_w: 0.001
  storage_tb: 0.00001
  loss_db: 0.001
  energy_kwh: 0.001

rules:
  - id: manifest_completeness
    stage: source_intake
    check: All files listed in project.json data_files exist and parse where applicable.
    diagnostic: missing_or_unparseable_source_pack_file
  - id: source_status_boundary
    stage: source_intake
    check: The response treats all numeric grading values as task-owned synthetic fixture values.
    diagnostic: source_status_boundary_violation
  - id: object_identity
    stage: source_intake
    check: Object IDs in device-schedule.csv join to object IDs in scene-layout.csv or declared cabinet-contained devices.
    diagnostic: object_identity_mismatch
  - id: lighting_grid_formula
    stage: lighting_summary
    check: Average, minimum, and min/average values recompute from lighting-grid-results.csv and match network-power-oracle.csv.
    diagnostic: lighting_summary_mismatch
  - id: lighting_thresholds
    stage: lighting_summary
    check: Lighting average, minimum, and min/average uniformity status flags match the thresholds in lighting_comms_source_manifest.yaml.
    diagnostic: lighting_threshold_status_mismatch
  - id: camera_ppm_formula
    stage: cctv_coverage
    check: actual_ppm equals horizontal_pixels divided by target_width_m for every camera row.
    diagnostic: camera_ppm_mismatch
  - id: camera_storage_formula
    stage: cctv_coverage
    check: storage_tb equals bitrate_mbps converted over retention_days with 1.10 overhead.
    diagnostic: camera_storage_mismatch
  - id: message_policy_trace
    stage: vms_policy
    check: The response names VMS-01 and MSG-POL-01 and does not invent additional message phases.
    diagnostic: message_policy_trace_missing
  - id: traffic_control_non_claim
    stage: vms_policy
    check: The response does not claim full MUTCD compliance or authority approval from the synthetic message policy.
    diagnostic: unsupported_traffic_control_claim
  - id: bandwidth_formula
    stage: network_power
    check: Network load equals sum of device-schedule.csv network_load_mbps and stays below max design utilization.
    diagnostic: bandwidth_handoff_mismatch
  - id: poe_formula
    stage: network_power
    check: PoE load equals sum of device-schedule.csv poe_load_w and stays below the source-manifest PoE budget.
    diagnostic: poe_handoff_mismatch
  - id: fibre_loss_formula
    stage: network_power
    check: Fibre loss equals fibre length loss plus connector, splice, and reserve loss shown in network-power-oracle.csv.
    diagnostic: fibre_loss_mismatch
  - id: backup_energy_formula
    stage: network_power
    check: UPS energy equals selected normal lighting, VMS, and cabinet loads times autonomy divided by UPS efficiency.
    diagnostic: backup_energy_mismatch
  - id: memo_traceability
    stage: visual_operations_memo
    check: The response cites source files and preserves handoff IDs or values for lighting, CCTV, network, PoE, fibre, and UPS checks.
    diagnostic: memo_traceability_gap
  - id: no_silent_handoff_mutation
    stage: visual_operations_memo
    check: The response does not change a source value or handoff value without flagging a source conflict.
    diagnostic: silent_handoff_mutation
  - id: readiness_non_claim
    stage: visual_operations_memo
    check: The response does not claim accepted project status, executable verifier readiness, generated instances, or benchmark readiness.
    diagnostic: readiness_overclaim
