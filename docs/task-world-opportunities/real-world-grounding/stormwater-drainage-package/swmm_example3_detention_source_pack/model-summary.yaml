known_source_boundary_issues:
  - id: timestep_narrative_vs_inp
    observation: The manual narrative says final comparison runs used 15-second reporting, wet-weather, and flow-routing steps, but Example3.inp has 1-minute report and wet steps plus a 15-second routing step.
    verifier_implication: Treat Example3.inp as authoritative for model-file option checks and require answers to disclose the mismatch if they use the manual narrative.
  - id: area_rounding_manual_vs_inp
    observation: The manual uses a 28.94-acre study area for WQCV arithmetic, while rounded Example3.inp subcatchment rows sum to 28.92 acres.
    verifier_implication: Allow small area-rounding tolerance and require source provenance for any WQCV recomputation.
