version = "1.0"

[metadata]
difficulty = "medium"
category = "power-systems"
tags = ["electrical", "grid-control", "multimodal", "qv-droop"]

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 120.0

[environment]
extensions = ["multimodal"]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 5120
allow_internet = true

[[environment.tools]]
name = "create_chart"
source = "tools/create_chart.py"
description = "Generate a Q(V) droop curve chart from computed data. Pass a JSON string with keys: rated_reactive_power_mvar, base_voltage_pu, deadband_pu, droop_pct, qmin_mvar, qmax_mvar, qnormal_mvar, vref_pu, operating_voltage_pu, slope_mvar_per_pu, reactive_power_mvar, delta_q_mvar. Returns the chart image for visual review."
returns_image = true
